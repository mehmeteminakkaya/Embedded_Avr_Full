<script id="v6-lesson-overhaul-script">
const LESSON_OVERHAUL = {"basics": {"goals": ["Register, immediate, SRAM ve I/O farkını ayırmak", "LDI/MOV/LDS/STS/IN/OUT komutlarını ne zaman kullanacağını bilmek", "R16-R31 kuralını ezber değil encoding mantığıyla anlamak", "ALU komutlarında hedef registerın neden değiştiğini okumak"], "sections": [{"title": "Büyük resim: AVR kodu nasıl akar?", "body": "Assembly satırı aslında CPU’ya çok küçük bir iş yaptırır. Veriyi önce register’a alırsın, ALU ile işlersin, sonra gerekirse I/O registerına veya SRAM’e yazarsın. Bu yüzden dersin temeli “veri nereden geliyor, nereye gidiyor?” sorusudur.", "steps": ["Sabit değer gerekiyorsa immediate kullanılır: LDI R20,5", "Başka registerdaki değer gerekiyorsa MOV kullanılır", "SRAM’den okuyacaksan LDS veya LD kullanılır", "I/O registerı okuyup yazacaksan IN/OUT kullanılır", "ALU işlemlerinde sonuç genelde ilk operandın üzerine yazılır"]}, {"title": "Register aileleri ve özel çiftler", "body": "R0-R31 genel amaçlı 8 bit registerlardır ama her biri pratikte aynı rahatlıkta kullanılmaz. LDI sadece R16-R31 ile çalışır. X/Y/Z ise iki registerın birleşip 16 bit adres tutmasıdır.", "table": {"headers": ["Yapı", "Register", "Ne için kullanılır?", "Önemli not"], "rows": [["Genel register", "R0-R31", "Geçici veri ve ALU işlemleri", "Her biri 8 bittir"], ["LDI uyumlu grup", "R16-R31", "Sabit sayı yükleme", "LDI R5,10 yazamazsın"], ["X pointer", "R27:R26", "SRAM adresi tutma", "XH=R27, XL=R26"], ["Y pointer", "R29:R28", "SRAM adresi + displacement", "YH=R29, YL=R28"], ["Z pointer", "R31:R30", "SRAM/Flash adresi", "LPM genelde Z ile kullanılır"]]}}, {"title": "Veri taşıma komutları tablosu", "body": "Bu tabloyu ezber gibi değil, kaynak-hedef mantığıyla oku. “Sayı mı yüklüyorum, register mı kopyalıyorum, SRAM mi, I/O mu?” diye sor.", "table": {"headers": ["Komut", "Kaynak", "Hedef", "Örnek", "Mantık"], "rows": [["LDI", "Sabit sayı", "R16-R31", "LDI R20,5", "R20 = 5"], ["MOV", "Register", "Register", "MOV R5,R20", "R5 = R20 kopyası"], ["LDS", "SRAM adresi", "Register", "LDS R16,0x140", "R16 = SRAM[0x140]"], ["STS", "Register", "SRAM adresi", "STS 0x140,R16", "SRAM[0x140] = R16"], ["IN", "I/O register", "Register", "IN R16,PINB", "R16 = PINB"], ["OUT", "Register", "I/O register", "OUT PORTB,R16", "PORTB = R16"]]}}, {"title": "ADD/SUB hedef mantığı", "body": "ADD Rd,Rr ve SUB Rd,Rr formatında Rd hem kaynak hem hedeftir. Bu yüzden ADD R16,R17 yazınca ayrı bir sonuç registerı oluşmaz; R16 güncellenir. R17 aynı kalır.", "table": {"headers": ["Kod", "Önce", "Sonra", "Açıklama"], "rows": [["ADD R16,R17", "R16=10, R17=3", "R16=13, R17=3", "Sonuç ilk operandın üstüne yazılır"], ["SUB R16,R17", "R16=10, R17=3", "R16=7, R17=3", "Çıkarma da aynı mantık"], ["MOV R18,R16 / ADD R18,R17", "R16=10,R17=3", "R18=13, R16 korunur", "Sonucu ayrı yerde istiyorsan önce kopyala"]]}}], "examples": [{"title": "LDI sadece üst register grubuna yükler", "code": "LDI R16, 5\nMOV R5, R16\n; R5 artik 5, ama direkt LDI R5,5 yazamazdin\n", "explain": "Önce LDI uyumlu bir register kullanılır, sonra MOV ile alt registera kopyalanır.", "trace": ["LDI R16,5: sabit sayı R16’ya gelir", "MOV R5,R16: değer kopyalanır; R16 silinmez"]}, {"title": "Sonucu ayrı registerda koruma", "code": "LDI R20, 30\nLDI R21, 12\nMOV R22, R20\nADD R22, R21\n; R20=30, R21=12, R22=42\n", "explain": "ADD R20,R21 yapsaydın R20 bozulurdu. Sonuç R22’de isteniyorsa önce MOV gerekir."}, {"title": "I/O yazma mini örneği", "code": "LDI R16, 0xFF\nOUT DDRB, R16\nLDI R16, 0xA5\nOUT PORTB, R16\n", "explain": "Registerdaki değer önce DDRB’ye, sonra PORTB’ye yazılır. OUT sadece I/O registerlarına yazmak için kullanılır."}], "pitfalls": [{"bad": "LDI R0,5 yazmak", "fix": "LDI sadece R16-R31. Alt register için önce R16’ya yükle, sonra MOV yap."}, {"bad": "ADD sonucunu yeni bir yerde beklemek", "fix": "ADD Rd,Rr sonucunu Rd’ye yazar."}, {"bad": "IN/OUT ile SRAM adresi kullanmak", "fix": "IN/OUT I/O register içindir. SRAM için LDS/STS veya LD/ST kullan."}]}, "flags": {"goals": ["SREG tablosunu tek ekranda okuyabilmek", "Her flagin hangi durumda 1 olduğunu bilmek", "Signed ve unsigned karşılaştırmada farklı branch seçmek", "CP/CPI sonrası hangi branchlerin anlamlı olduğunu anlamak"], "sections": [{"title": "SREG flag tablosu", "body": "SREG, işlem sonucunun durum raporudur. Flagler sonucu değiştirmez, sadece son işlem hakkında bilgi verir. Branch komutları da bu bilgiyi kullanır.", "table": {"headers": ["Bit", "Flag", "Adı", "Ne zaman 1 olur?", "En çok nerede kullanılır?"], "rows": [["7", "I", "Global Interrupt Enable", "SEI sonrası kesmelere izin verildiğinde", "Interrupt aç/kapat"], ["6", "T", "Transfer bit", "BST/BLD gibi bit transfer işlemlerinde", "Tek bit taşıma"], ["5", "H", "Half Carry", "Bit3’ten bit4’e taşıma/borrow olursa", "BCD/nibble işlemleri"], ["4", "S", "Sign = N XOR V", "Signed sonucun düzeltilmiş işaret bilgisi 1 ise", "BRLT/BRGE"], ["3", "V", "Overflow", "Signed aralık taşarsa", "Signed aritmetik"], ["2", "N", "Negative", "Sonucun MSB biti 1 ise", "Negatif görünüm"], ["1", "Z", "Zero", "Sonuç 0 ise", "BREQ/BRNE, loop"], ["0", "C", "Carry/Borrow", "Toplamada carry, çıkarmada borrow olursa", "Unsigned karşılaştırma, ADC/SBC"]]}}, {"title": "Flag → Branch eşleşme tablosu", "body": "Branch komutlarını ayrı ayrı ezberlemek yerine hangi flage baktığını öğren. CP Rd,Rr sonrası dallanma, aslında Rd-Rr sonucunun flaglerine bakmaktır.", "table": {"headers": ["Branch", "Koşul", "Yorum", "Signed/Unsigned"], "rows": [["BREQ", "Z=1", "Eşit", "İkisi de"], ["BRNE", "Z=0", "Eşit değil", "İkisi de"], ["BRCS / BRLO", "C=1", "Carry var / unsigned lower", "Unsigned"], ["BRCC / BRSH", "C=0", "Carry yok / unsigned same or higher", "Unsigned"], ["BRMI", "N=1", "Negative görünür", "Genel"], ["BRPL", "N=0", "Positive görünür", "Genel"], ["BRLT", "S=1", "Signed less than", "Signed"], ["BRGE", "S=0", "Signed greater/equal", "Signed"], ["BRVS", "V=1", "Signed overflow var", "Signed"], ["BRVC", "V=0", "Signed overflow yok", "Signed"]]}}, {"title": "Signed / unsigned tuzağı", "body": "Aynı bit dizisi iki farklı anlam taşıyabilir. 11111010 unsigned bakınca 250, signed bakınca -6’dır. CPU bunu bilmez; sen hangi branchi seçersen o yorum geçerli olur.", "table": {"headers": ["Bit", "Unsigned", "Signed", "Hangi branch mantıklı?"], "rows": [["01111111", "127", "127", "İkisi de aynı görünür"], ["10000000", "128", "-128", "Signed için BRLT/BRGE"], ["11111111", "255", "-1", "Unsigned için BRLO/BRSH, signed için BRLT/BRGE"], ["11111010", "250", "-6", "Yorum komuta bağlıdır"]]}}, {"title": "Komutların flag etkisi", "body": "Her komut flagleri aynı şekilde etkilemez. LDI/MOV flag değiştirmezken ADD/SUB/CP gibi komutlar SREG’i günceller.", "table": {"headers": ["Komut grubu", "Flag etkisi", "Not"], "rows": [["LDI, MOV, LDS, STS", "Genelde yok", "Veri taşıma sonucu SREG değişmez"], ["ADD, ADC", "Z,C,N,V,S,H", "Toplama sonrası flagler güncellenir"], ["SUB, SUBI, SBC", "Z,C,N,V,S,H", "Çıkarmada C borrow anlamına gelir"], ["CP, CPI, CPC", "Z,C,N,V,S,H", "Sonuç yazılmaz, flag ayarlanır"], ["AND, OR, EOR, TST", "Z,N,V=0,S", "Carry genelde etkilenmez"], ["INC, DEC", "Z,N,V,S", "C etkilenmez"]]}}], "examples": [{"title": "Z flag ile loop bitirme", "code": "LDI R16, 3\nLOOP:\nDEC R16\nBRNE LOOP\n; R16 0 olunca Z=1, BRNE artik donmez\n", "explain": "DEC sonucu 0 olduğunda Z=1 olur. BRNE sadece Z=0 iken döner."}, {"title": "Unsigned küçük kontrolü", "code": "LDI R16, 3\nLDI R17, 5\nCP R16, R17\nBRLO KUCUK\nLDI R18, 0\nRJMP SON\nKUCUK:\nLDI R18, 1\nSON:\n", "explain": "3-5 borrow ister. C=1 olduğu için BRLO çalışır."}, {"title": "Signed küçük kontrolü", "code": "LDI R16, 250 ; signed yorumda -6\nLDI R17, 5\nCP R16, R17\nBRLT SIGNED_KUCUK\nLDI R18, 0\nRJMP SON\nSIGNED_KUCUK:\nLDI R18, 1\nSON:\n", "explain": "BRLT signed yorum yaptığı için 250 bit dizisini -6 gibi değerlendirir."}]}, "arith": {"goals": ["AND/OR/EOR mask mantığını bilmek", "Shift ve rotate komutlarını ayırmak", "Bit set-clear-toggle işlemlerini yazmak", "Flag etkilerini genel seviyede okumak"], "sections": [{"title": "Bit işlemleri ana tablo", "body": "Port, timer, interrupt registerları çoğunlukla bit bit ayarlanır. Bu yüzden ANDI/ORI/EOR assemblyde çok sık görünür.", "table": {"headers": ["İşlem", "Komut", "Maske", "Sonuç mantığı", "Kullanım"], "rows": [["Bit temizleme", "ANDI", "0 yapılacak bit maskede 0", "1 AND 0 = 0", "Register bitlerini sıfırlama"], ["Bit set etme", "ORI", "1 yapılacak bit maskede 1", "0 OR 1 = 1", "WGM/CS/PORT bitleri set"], ["Toggle", "EOR", "Terslenecek bit maskede 1", "1 XOR 1 = 0, 0 XOR 1 = 1", "LED yak-söndür"], ["Test", "TST", "Kendiyle AND", "Sadece flag ayarlar", "Sıfır mı/negatif mi kontrol"]]}}, {"title": "Shift / rotate tablosu", "body": "Shift bitleri fiziksel olarak kaydırır; rotate carry üzerinden döndürür. Multi-byte işlemlerde carry zinciri önemli olur.", "table": {"headers": ["Komut", "Yön", "MSB/LSB ne olur?", "Carry etkisi", "Tipik kullanım"], "rows": [["LSL", "Sola", "LSB’ye 0 girer", "Eski MSB C’ye gider", "Unsigned x2"], ["LSR", "Sağa", "MSB’ye 0 girer", "Eski LSB C’ye gider", "Unsigned /2"], ["ASR", "Sağa", "MSB korunur", "Eski LSB C’ye gider", "Signed /2"], ["ROL", "Sola", "C LSB’ye girer", "Eski MSB C’ye gider", "Çok byte sola kaydırma"], ["ROR", "Sağa", "C MSB’ye girer", "Eski LSB C’ye gider", "Çok byte sağa kaydırma"], ["SWAP", "Nibble değiştirir", "Üst 4 bit ile alt 4 bit yer değiştirir", "Flag yok", "BCD/nibble düzenleme"]]}}, {"title": "Aritmetik komut tablosu", "body": "ADC/SBC komutları tek byte işlemlerde gereksiz gibi görünür ama 16-bit/32-bit işlemlerde asıl olaydır. Carry/borrow zincirini taşırlar.", "table": {"headers": ["Komut", "Anlam", "Ne zaman kullanılır?", "Örnek"], "rows": [["ADD", "Topla", "8-bit toplama", "ADD R20,R21"], ["ADC", "Carry ile topla", "16-bit toplamada high byte", "ADC R21,R23"], ["SUB", "Çıkar", "8-bit çıkarma", "SUB R20,R21"], ["SBC", "Carry/borrow ile çıkar", "16-bit çıkarmada high byte", "SBC R21,R23"], ["INC/DEC", "1 artır/azalt", "Sayaç", "DEC R16 / BRNE LOOP"], ["NEG", "Two’s complement negatif al", "R = 0-R", "NEG R16"], ["COM", "Bitleri tersle", "One’s complement", "COM R16"], ["MUL", "8x8 çarp", "Sonuç R1:R0", "MUL R16,R17"]]}}], "examples": [{"title": "Bit temizle ve set et", "code": "LDI R20, 0b11111111\nANDI R20, 0b11110111 ; bit3 temizlenir\nORI R20,  0b00100000 ; bit5 set edilir\n", "explain": "ANDI temizleme, ORI set etme için kullanılır."}, {"title": "16-bit toplama mantığı", "code": "LDI R20, 0xFF ; low byte A\nLDI R21, 0x00 ; high byte A\nLDI R22, 0x01 ; low byte B\nLDI R23, 0x00 ; high byte B\nADD R20, R22\nADC R21, R23\n; sonuc 0x0100: R21=1, R20=0\n", "explain": "Low byte taşınca C=1 olur. ADC high byte’a bu carry’yi ekler."}, {"title": "LSR ile bit sayma fikri", "code": "LDI R20, 0b10110000\nLSR R20\n; eski bit0 C flagine gider\n", "explain": "Her LSR işleminde çıkan bit C’ye gider; popcount algoritmalarında kullanılır."}]}, "branch": {"goals": ["RJMP/JMP ile koşullu branch farkını ayırmak", "CP sonrası doğru branch seçmek", "Loop yapısını okuyabilmek", "Skip komutlarının sonraki komutu atladığını bilmek"], "sections": [{"title": "Branch, jump, call farkı", "body": "Hepsi program akışını değiştirir ama amaçları farklıdır. Branch koşulludur, jump koşulsuzdur, call geri dönülebilen fonksiyon çağrısıdır.", "table": {"headers": ["Tür", "Komutlar", "Geri döner mi?", "Neye bağlı?"], "rows": [["Conditional branch", "BREQ,BRNE,BRLO,BRLT...", "Hayır", "Flag koşuluna"], ["Jump", "RJMP,JMP,IJMP", "Hayır", "Koşulsuz"], ["Call", "CALL,RCALL", "Evet, RET ile", "Stackte return address saklanır"], ["Skip", "SBIC,SBIS,SBRC,SBRS", "Hayır", "Bir bitin 0/1 olmasına"]]}}, {"title": "CP sonrası karşılaştırma rehberi", "body": "CP Rd,Rr komutundan sonra “Rd mi Rr mi?” diye okuyacaksın. Unsigned ve signed branchleri karıştırırsan aynı bitlere farklı cevap alırsın.", "table": {"headers": ["İstediğin kontrol", "Unsigned branch", "Signed branch", "Not"], "rows": [["Rd == Rr", "BREQ", "BREQ", "Z=1"], ["Rd != Rr", "BRNE", "BRNE", "Z=0"], ["Rd < Rr", "BRLO", "BRLT", "Unsigned C, signed S"], ["Rd >= Rr", "BRSH", "BRGE", "Unsigned C=0, signed S=0"], ["Rd carry/borrow üretti", "BRCS", "-", "C=1"], ["Overflow oldu", "-", "BRVS", "V=1"]]}}, {"title": "Skip komutları tablosu", "body": "Skip komutları branch gibi labela gitmez. Sadece hemen sonraki instructionı atlar. Bu yüzden skip sonrası genelde RJMP veya kısa tek komut koyulur.", "table": {"headers": ["Komut", "Baktığı yer", "Koşul", "Ne yapar?"], "rows": [["SBIC io,bit", "I/O register", "Bit 0 ise", "Sonraki komutu atlar"], ["SBIS io,bit", "I/O register", "Bit 1 ise", "Sonraki komutu atlar"], ["SBRC Rr,bit", "Register", "Bit 0 ise", "Sonraki komutu atlar"], ["SBRS Rr,bit", "Register", "Bit 1 ise", "Sonraki komutu atlar"]]}}], "examples": [{"title": "Sayaç loop", "code": "LDI R16, 5\nLOOP:\nDEC R16\nBRNE LOOP\n", "explain": "DEC Z flagini ayarlar. R16 sıfır olana kadar dönülür."}, {"title": "Skip sonrası RJMP kalıbı", "code": "SBIS PINB, 0\nRJMP BUTTON_LOW\nLDI R20, 1\nRJMP DONE\nBUTTON_LOW:\nLDI R20, 0\nDONE:\n", "explain": "PINB.0 set ise RJMP atlanır ve R20=1 tarafına gidilir."}, {"title": "Karar ağacı", "code": "LDI R16, 80\nCPI R16, 50\nBRLO SMALL\nLDI R17, 1\nRJMP DONE\nSMALL:\nLDI R17, 0\nDONE:\n", "explain": "Unsigned R16 < 50 ise SMALL çalışır."}]}, "io": {"goals": ["DDRx/PORTx/PINx farkını tabloyla görmek", "Pull-up mantığını ezber değil devre mantığıyla anlamak", "SBI/CBI/SBIC/SBIS kullanımını bilmek", "Buton okuma ve LED yazmayı ayırmak"], "sections": [{"title": "DDRx / PORTx / PINx ana tablo", "body": "I/O konusunda en çok karışan yer burasıdır. DDR yön seçer, PORT çıkış değeri veya pull-up kontrol eder, PIN gerçek pin seviyesini okur.", "table": {"headers": ["Register", "Pin input iken", "Pin output iken", "Okuma/yazma", "Örnek"], "rows": [["DDRx", "0 = input seçer", "1 = output seçer", "Yazılır", "SBI DDRB,5"], ["PORTx", "1 = internal pull-up açar, 0 = kapatır", "1 = HIGH, 0 = LOW", "Yazılır", "OUT PORTB,R16"], ["PINx", "Pindeki gerçek logic seviye okunur", "Genelde pin seviyesi okunur", "Okunur", "IN R16,PINB"]]}}, {"title": "Pull-up / pull-down mantığı", "body": "Buton basılı değilken pinin havada kalmasını istemezsin. Pull-up açarsan basılmazken 1, GND’ye basılınca 0 okursun. Bu ters mantık başta çok kafa karıştırır.", "table": {"headers": ["Devre tipi", "Basılmazken", "Basılınca", "Kod mantığı"], "rows": [["Internal pull-up", "1", "0", "PORTx bit=1, DDRx bit=0"], ["External pull-down", "0", "1", "Dış direnç GND’ye bağlıdır"], ["Floating input", "Belirsiz", "Belirsiz", "Kullanma; gürültü okursun"]]}}, {"title": "I/O bit komutları", "body": "Tek biti değiştirmek için bütün registerı maskelemek zorunda değilsin. SBI/CBI doğrudan I/O bitini set/clear eder.", "table": {"headers": ["Komut", "Anlam", "Örnek", "Sonuç"], "rows": [["SBI", "I/O bitini 1 yap", "SBI DDRB,5", "PB5 output olur"], ["CBI", "I/O bitini 0 yap", "CBI PORTB,5", "PB5 LOW olur"], ["SBIC", "Bit 0 ise sonraki komutu atla", "SBIC PINB,0", "PINB0=0 ise skip"], ["SBIS", "Bit 1 ise sonraki komutu atla", "SBIS PINB,0", "PINB0=1 ise skip"]]}}, {"title": "Port yazarken maske kullanımı", "body": "PORTB’ye direkt 0xFF yazmak bütün pinleri etkiler. Sadece bir biti değiştirmek istiyorsan SBI/CBI veya ANDI/ORI maskeleme kullan.", "table": {"headers": ["İhtiyaç", "Güvenli yol", "Riskli yol"], "rows": [["Sadece PB5 HIGH", "SBI PORTB,5", "OUT PORTB,0x20 diğer bitleri bozabilir"], ["Sadece PB5 LOW", "CBI PORTB,5", "OUT PORTB,0 tüm portu sıfırlar"], ["PB5 toggle", "EOR ile maske veya PORTB ^=", "Bütün PORT’u yeniden yazmak"]]}}], "examples": [{"title": "PB5 LED yak", "code": "SBI DDRB, 5\nSBI PORTB, 5\n", "explain": "Önce PB5 output yapılır, sonra HIGH yazılır."}, {"title": "Pull-up buton okuma", "code": "CBI DDRB, 0    ; PB0 input\nSBI PORTB, 0   ; pull-up acik\nSBIS PINB, 0   ; bit 1 ise sonraki komutu atla\nRJMP BASILDI\nLDI R20, 0\nRJMP SON\nBASILDI:\nLDI R20, 1\nSON:\n", "explain": "Pull-up devrede buton basılınca pin 0 olur. Bu yüzden mantık ters görünür."}, {"title": "PORTB pattern yazma", "code": "LDI R16, 0xFF\nOUT DDRB, R16\nLDI R16, 0b10100101\nOUT PORTB, R16\n", "explain": "DDRB tüm pinleri çıkış yapar; PORTB LED patternini gösterir."}]}, "stack": {"goals": ["Stack pointer neden RAMEND’e ayarlanır bilmek", "PUSH/POP sırasını LIFO olarak okumak", "CALL/RET mekanizmasını return address ile anlamak", "Subroutine içinde register koruma mantığını bilmek"], "sections": [{"title": "Stack nedir?", "body": "Stack son giren ilk çıkar yapıdır. AVR’de stack SRAM içinde kullanılır ve genelde yukarı adreslerden aşağı doğru büyür. CALL return address’i stacke koyar; RET oradan alıp geri döner.", "table": {"headers": ["İşlem", "Stack davranışı", "SP davranışı", "Not"], "rows": [["PUSH R16", "R16 değeri stacke konur", "SP azalır", "Veri saklama"], ["POP R16", "Stackten değer alınır", "SP artar", "Son PUSH edilen önce çıkar"], ["CALL label", "Return address stacke konur", "SP azalır", "Fonksiyon çağrısı"], ["RET", "Return address stackten alınır", "SP artar", "Çağrıldığı yere döner"]]}}, {"title": "Stack initialization", "body": "Assemblyde stack kullanmadan önce SPH/SPL registerlarını RAMEND’e ayarlamak iyi alışkanlıktır. Yoksa PUSH/CALL beklemediğin SRAM adreslerini bozabilir.", "table": {"headers": ["Satır", "Ne yapar?"], "rows": [["LDI R16,HIGH(RAMEND)", "RAMEND’in yüksek byteını hazırlar"], ["OUT SPH,R16", "SP high byte ayarlanır"], ["LDI R16,LOW(RAMEND)", "RAMEND’in düşük byteını hazırlar"], ["OUT SPL,R16", "SP low byte ayarlanır"]]}}, {"title": "Subroutine yazma kuralları", "body": "Fonksiyon içinde kullandığın registerları çağıran kod da kullanıyor olabilir. Bu yüzden kritik registerları PUSH ile saklayıp RET öncesi POP ile geri almak gerekir.", "table": {"headers": ["Kural", "Sebep"], "rows": [["CALL varsa RET olmalı", "Yoksa program geri dönemez"], ["PUSH sırası POP ile ters olmalı", "LIFO mantığı"], ["Kullandığın registerı koru", "Ana programın değeri bozulmasın"], ["Stack init unutma", "SP yanlışsa SRAM bozulur"]]}}], "examples": [{"title": "PUSH/POP sırası", "code": "LDI R16, HIGH(RAMEND)\nOUT SPH, R16\nLDI R16, LOW(RAMEND)\nOUT SPL, R16\nLDI R20, 0xAA\nLDI R21, 0x55\nPUSH R20\nPUSH R21\nPOP R22\nPOP R23\n; R22=0x55, R23=0xAA\n", "explain": "Son giren R21 önce çıkar."}, {"title": "Basit CALL/RET", "code": "LDI R16, HIGH(RAMEND)\nOUT SPH, R16\nLDI R16, LOW(RAMEND)\nOUT SPL, R16\nLDI R20, 10\nCALL ARTIR\nRJMP SON\nARTIR:\nINC R20\nRET\nSON:\n", "explain": "CALL dönüş adresini stacke koyar. RET o adrese geri döner."}, {"title": "Register koruyan fonksiyon", "code": "CALL ISLEM\nRJMP SON\nISLEM:\nPUSH R16\nLDI R16, 5\n; gecici isler\nPOP R16\nRET\nSON:\n", "explain": "Fonksiyon R16’yı geçici kullansa bile geri eski haline getirir."}]}, "addressing": {"goals": ["Direct ve indirect addressing farkını bilmek", "X/Y/Z pointer çiftlerini ezber değil adres mantığıyla anlamak", "X+, -X, Y+q gibi yazımları okuyabilmek", "SRAM dizi işlemlerini loop ile kurmak"], "sections": [{"title": "Adresleme modları ana tablo", "body": "Aynı “load” fikri farklı kaynaklardan veri alabilir. LDI sabit sayı alır, LDS direkt SRAM adresinden alır, LD pointerın gösterdiği adresten alır.", "table": {"headers": ["Mod", "Komut", "Adres/veri nerede?", "Örnek", "Mantık"], "rows": [["Immediate", "LDI", "Komutun içinde sabit sayı", "LDI R16,5", "R16=5"], ["Register direct", "MOV", "Register içinde", "MOV R16,R17", "R16=R17"], ["Data direct", "LDS/STS", "Sabit SRAM adresi", "LDS R16,0x140", "R16=SRAM[0x140]"], ["Indirect", "LD/ST", "X/Y/Z pointer adresi", "LD R16,X", "R16=SRAM[X]"], ["Displacement", "LDD/STD", "Y/Z + offset", "LDD R16,Y+3", "R16=SRAM[Y+3]"], ["Program memory", "LPM", "Flash, Z pointer", "LPM R16,Z+", "R16=Flash[Z]"]]}}, {"title": "X/Y/Z pointer tablosu", "body": "Pointer registerın kendisi veri değil adres tutar. ST Y+,R16 dediğinde R16 Y’nin gösterdiği SRAM adresine yazılır, sonra Y artar.", "table": {"headers": ["Pointer", "Register çifti", "Ek özellik", "Tipik kullanım"], "rows": [["X", "R27:R26", "LD/ST, X+, -X", "Basit SRAM gezme"], ["Y", "R29:R28", "Y+q displacement destekler", "Dizi/struct benzeri erişim"], ["Z", "R31:R30", "Z+q ve LPM destekler", "Flash tablosu okuma"]]}}, {"title": "Auto increment / pre decrement", "body": "Artı ve eksi işaretleri pointerın ne zaman değişeceğini gösterir. Bu dizi gezmek için çok kullanışlıdır.", "table": {"headers": ["Yazım", "İşlem sırası", "Açıklama"], "rows": [["LD R16,X", "Oku", "X değişmez"], ["LD R16,X+", "Oku, sonra X++", "Dizide ileri git"], ["LD R16,-X", "Önce X--, sonra oku", "Geri yönde/stack benzeri"], ["ST Y+,R16", "Y’ye yaz, sonra Y++", "Dizi doldurma"], ["LDD R16,Y+5", "Y+5’ten oku", "Y değişmez"]]}}], "examples": [{"title": "SRAM’e direkt yaz/oku", "code": "LDI R16, 0x77\nSTS 0x140, R16\nLDS R17, 0x140\n", "explain": "0x140 adresine yazılır, sonra aynı adresten R17’ye okunur."}, {"title": "Y+ ile dizi doldurma", "code": "LDI YL, 0x40\nLDI YH, 0x01\nLDI R16, 0xAA\nLDI R18, 5\nLOOP:\nST Y+, R16\nDEC R18\nBRNE LOOP\n", "explain": "0x140’tan başlayarak 5 byte 0xAA yazılır."}, {"title": "LDD ile offset okuma", "code": "LDI YL, 0x40\nLDI YH, 0x01\nLDD R20, Y+3\n", "explain": "Y değişmeden SRAM[Y+3] okunur."}]}, "timer": {"goals": ["Timer/counter farkını anlamak", "Timer0 Normal ve CTC modlarını tabloyla okumak", "TCCR0A/TCCR0B bitlerini ezber değil WGM/CS alanlarıyla ayarlamak", "TCNT0 ve OCR0A hesaplarını yapabilmek", "TOV0/OCF0A flag temizlemeyi bilmek"], "sections": [{"title": "Timer’ın büyük resmi", "body": "Timer, clock geldikçe TCNT registerını artıran donanımdır. İç clock ile zaman ölçer, dış pin clock ile olay sayar. Overflow veya compare match olduğunda flag set edilir.", "table": {"headers": ["Parça", "Görevi", "Örnek"], "rows": [["TCNTn", "Sayaç değeri", "TCNT0 8-bit, TCNT1 16-bit"], ["TCCRnA/B", "Mode ve clock seçimi", "WGM ve CS bitleri"], ["TIFRn", "Flag registerı", "TOV0, OCF0A"], ["OCRnA/B", "Compare değeri", "CTC/PWM compare"], ["TIMSKn", "Interrupt enable", "TOIE0, OCIE0A"]]}}, {"title": "Timer0 WGM mode tablosu: TCCR0A/TCCR0B", "body": "Timer0’da WGM00 ve WGM01 TCCR0A içindedir; WGM02 TCCR0B içindedir. Bu yüzden mode seçerken iki register birlikte düşünülür.", "table": {"headers": ["WGM02", "WGM01", "WGM00", "Mode", "Mantık"], "rows": [["0", "0", "0", "Normal", "0xFF’e kadar say, taşınca TOV0 set"], ["0", "0", "1", "Phase Correct PWM", "PWM için"], ["0", "1", "0", "CTC", "TCNT0 == OCR0A olunca clear, OCF0A set"], ["0", "1", "1", "Fast PWM", "PWM için"], ["1", "0", "0", "Reserved", "Kullanma"], ["1", "0", "1", "Phase Correct PWM", "OCR0A top varyantı"], ["1", "1", "0", "Reserved", "Kullanma"], ["1", "1", "1", "Fast PWM", "OCR0A top varyantı"]]}}, {"title": "Timer0 clock select tablosu: TCCR0B CS02 CS01 CS00", "body": "CS bitleri timerın hangi hızda sayacağını belirler. 000 timer durur. Prescaler büyüdükçe timer daha yavaş sayar ve daha uzun delay elde edilir.", "table": {"headers": ["CS02", "CS01", "CS00", "Clock source", "TCCR0B alt bit değeri"], "rows": [["0", "0", "0", "No clock, timer stopped", "0"], ["0", "0", "1", "clk / 1", "1"], ["0", "1", "0", "clk / 8", "2"], ["0", "1", "1", "clk / 64", "3"], ["1", "0", "0", "clk / 256", "4"], ["1", "0", "1", "clk / 1024", "5"], ["1", "1", "0", "External clock on T0 falling edge", "6"], ["1", "1", "1", "External clock on T0 rising edge", "7"]]}}, {"title": "Normal mode hesabı", "body": "8-bit Timer0 normal modda 0xFF’ten sonra 0x00’a döner ve TOV0 set olur. n tick beklemek istiyorsan TCNT0 = 256 - n yüklenir.", "steps": ["Timer tick süresi = prescaler / F_CPU", "İstenen delay / tick süresi = n", "Normal mode preload = 256 - n", "Overflow olunca TOV0=1", "TIFR0’ya 1<<TOV0 yazarak flag temizlenir"], "table": {"headers": ["İstenen tick", "TCNT0 preload", "Neden"], "rows": [["14", "242 = 0xF2", "256-14"], ["50", "206 = 0xCE", "256-50"], ["200", "56 = 0x38", "256-200"], ["256", "0", "Maksimum 8-bit overflow"]]}}, {"title": "CTC mode hesabı", "body": "CTC modda timer 0’dan OCR0A’ya kadar sayar. Compare match oluşunca OCF0A set edilir. 0 da sayıldığı için n tick için OCR0A = n - 1 yüklenir.", "steps": ["Timer tick süresini bul", "Delay / tick = n", "OCR0A = n - 1", "WGM01=1 yaparak CTC mode seç", "OCF0A set olunca TIFR0’ya 1<<OCF0A yazarak temizle"], "table": {"headers": ["İstenen tick", "OCR0A", "Neden"], "rows": [["50", "49", "0..49 toplam 50 değer"], ["125", "124", "0..124 toplam 125 tick"], ["200", "199", "0..199 toplam 200 tick"]]}}, {"title": "TIFR0 flag tablosu ve temizleme tuzağı", "body": "AVR’de bazı flagler 1 yazarak temizlenir. Bu başta ters gelir: TIFR0 = (1<<TOV0) yazmak flagi set etmek değil, temizlemek içindir.", "table": {"headers": ["Flag", "Bit", "Ne zaman set olur?", "Nasıl temizlenir?"], "rows": [["TOV0", "0", "Timer0 overflow", "OUT TIFR0, (1<<TOV0)"], ["OCF0A", "1", "TCNT0 == OCR0A compare match", "OUT TIFR0, (1<<OCF0A)"], ["OCF0B", "2", "TCNT0 == OCR0B compare match", "OUT TIFR0, (1<<OCF0B)"]]}}, {"title": "Timer0 / Timer1 / Timer2 karşılaştırması", "body": "Timer1 16-bit olduğu için büyük delaylerde daha rahattır. Timer2 de 8-bit ama prescaler seçenekleri Timer0’dan farklıdır.", "table": {"headers": ["Timer", "Bit genişliği", "Registerlar", "Prescaler seçenekleri", "Kullanım"], "rows": [["Timer0", "8-bit", "TCNT0, OCR0A/B, TCCR0A/B", "1,8,64,256,1024 + external", "Kısa delay, PWM"], ["Timer1", "16-bit", "TCNT1H/L, OCR1AH/L, TCCR1A/B/C", "1,8,64,256,1024 + external", "Uzun delay, hassas compare"], ["Timer2", "8-bit", "TCNT2, OCR2A/B, TCCR2A/B", "1,8,32,64,128,256,1024", "Farklı prescaler, async özellikler"]]}}, {"title": "Timer2 CS22 CS21 CS20 tablosu", "body": "Timer2’nin clock select tablosu Timer0 ile aynı değildir. Özellikle 32 ve 128 seçenekleri Timer2’de vardır.", "table": {"headers": ["CS22", "CS21", "CS20", "Timer2 clock"], "rows": [["0", "0", "0", "Stopped"], ["0", "0", "1", "clk / 1"], ["0", "1", "0", "clk / 8"], ["0", "1", "1", "clk / 32"], ["1", "0", "0", "clk / 64"], ["1", "0", "1", "clk / 128"], ["1", "1", "0", "clk / 256"], ["1", "1", "1", "clk / 1024"]]}}, {"title": "Kare dalga mantığı", "body": "Bir pini her delay sonunda toggle edersen oluşan delay yarım periyottur. Çünkü bir HIGH süresi, bir de LOW süresi vardır.", "table": {"headers": ["İstenen", "Hesap"], "rows": [["Kare dalga periyodu T", "Delay = T/2"], ["Frekans f", "T = 1/f"], ["Toggle delay", "T/2 = 1/(2f)"], ["Örnek 10 µs periyot", "5 µs delay gerekir"]]}}], "examples": [{"title": "Normal mode 14 tick bekleme", "code": "LDI R20, 0xF2 ; 256-14\nOUT TCNT0, R20\nLDI R20, 0x00\nOUT TCCR0A, R20 ; Normal mode\nLDI R20, 0x01\nOUT TCCR0B, R20 ; clk/1\nWAIT:\nSBIS TIFR0, TOV0\nRJMP WAIT\nLDI R20, 0x00\nOUT TCCR0B, R20 ; timer stop\nLDI R20, (1<<TOV0)\nOUT TIFR0, R20 ; flag temizle\n", "explain": "TCNT0 0xF2’den 0xFF’e gider ve taşınca TOV0 set olur."}, {"title": "CTC mode 50 tick", "code": "LDI R20, 49\nOUT OCR0A, R20\nLDI R20, (1<<WGM01)\nOUT TCCR0A, R20\nLDI R20, 0x01\nOUT TCCR0B, R20\nWAIT:\nSBIS TIFR0, OCF0A\nRJMP WAIT\nLDI R20, 0\nOUT TCCR0B, R20\nLDI R20, (1<<OCF0A)\nOUT TIFR0, R20\n", "explain": "0’dan 49’a kadar saymak 50 tick eder. Compare match OCF0A flagini set eder."}, {"title": "Prescaler 64 seçimi", "code": "LDI R20, (1<<CS01)|(1<<CS00) ; 0b011 = clk/64\nOUT TCCR0B, R20\n", "explain": "Timer0 için CS02:0 = 011 prescaler 64 demektir."}, {"title": "Timer1 16-bit preload fikri", "code": "LDI R20, HIGH(0xC180)\nOUT TCNT1H, R20\nLDI R20, LOW(0xC180)\nOUT TCNT1L, R20\n", "explain": "Timer1 16-bit olduğu için high ve low byte ayrı yazılır."}], "pitfalls": [{"bad": "CTC’de OCR0A=n yazmak", "fix": "0 da sayıldığı için n tick istiyorsan OCR0A=n-1."}, {"bad": "TIFR0 flagini 0 yazarak temizlemeye çalışmak", "fix": "AVR’de bu flagler 1 yazarak temizlenir."}, {"bad": "Timer0 ve Timer2 prescaler tablosunu aynı sanmak", "fix": "Timer2’de 32 ve 128 seçenekleri vardır; Timer0’da yoktur."}, {"bad": "Kare dalgada delayi periyot sanmak", "fix": "Toggle ediyorsan delay yarım periyottur."}]}, "interrupt": {"goals": ["Interrupt kavramını polling ile karşılaştırmak", "SEI/CLI ve I flag ilişkisini bilmek", "External interrupt ve timer interrupt registerlarını genel olarak okumak", "ISR akışında stack/return mantığını anlamak"], "sections": [{"title": "Polling vs interrupt", "body": "Polling sürekli “oldu mu?” diye kontrol etmektir. Interrupt ise olay olunca CPU’nun otomatik ISR’a atlamasıdır. Timer overflow, compare match, external pin gibi olaylar interrupt üretebilir.", "table": {"headers": ["Yöntem", "Mantık", "Avantaj", "Dezavantaj"], "rows": [["Polling", "Loop içinde flag/pin kontrol", "Basit", "CPU sürekli bekler"], ["Interrupt", "Olay olunca ISR çalışır", "CPU başka iş yapabilir", "Kurulum ve ISR dikkat ister"]]}}, {"title": "Global interrupt ve SREG I flag", "body": "Tek tek interrupt kaynaklarını açsan bile global I flag kapalıysa ISR çalışmaz. SEI I flagini 1 yapar, CLI 0 yapar.", "table": {"headers": ["Komut/Register", "Görev"], "rows": [["SEI", "SREG I bitini 1 yapar, global interrupt açılır"], ["CLI", "SREG I bitini 0 yapar, global interrupt kapanır"], ["SREG I", "Global izin bitidir"], ["RETI", "ISR’dan döner ve interrupt mantığına uygun dönüş yapar"]]}}, {"title": "Sık görülen interrupt registerları", "body": "Bu tablo bütün datasheetin yerine geçmez ama derslerde en çok görülen register isimlerini bağlama oturtur.", "table": {"headers": ["Register", "Alan/bit", "Ne işe yarar?"], "rows": [["EIMSK", "INT0/INT1", "External interrupt enable"], ["EICRA", "ISC01/ISC00", "INT0 tetikleme tipi"], ["TIMSK0", "TOIE0/OCIE0A", "Timer0 overflow/compare interrupt enable"], ["TIFR0", "TOV0/OCF0A", "Timer0 interrupt flagleri"], ["PCICR", "PCIE0/1/2", "Pin change interrupt enable grupları"]]}}, {"title": "External interrupt tetikleme mantığı", "body": "ISC bitleri external interruptın hangi olayda tetikleneceğini seçer: low level, any change, falling edge, rising edge.", "table": {"headers": ["ISC01", "ISC00", "INT0 tetikleme"], "rows": [["0", "0", "Low level"], ["0", "1", "Any logical change"], ["1", "0", "Falling edge"], ["1", "1", "Rising edge"]]}}], "examples": [{"title": "Global interrupt aç/kapat", "code": "CLI\n; kritik bolge\nSEI\n", "explain": "CLI geçici olarak interruptları kapatır, SEI tekrar açar."}, {"title": "Timer0 overflow interrupt enable fikri", "code": "LDI R20, (1<<TOIE0)\nOUT TIMSK0, R20\nSEI\n", "explain": "Timer0 overflow interrupt kaynağı açılır; global izin için SEI gerekir."}, {"title": "INT0 rising edge fikri", "code": "LDI R20, (1<<ISC01)|(1<<ISC00)\nOUT EICRA, R20\nLDI R20, (1<<INT0)\nOUT EIMSK, R20\nSEI\n", "explain": "INT0 rising edge ile tetiklenecek şekilde ayarlanır."}]}};

(function(){
  for (const lesson of LESSONS) {
    const patch = LESSON_OVERHAUL[lesson.id];
    if (!patch) continue;
    Object.assign(lesson, patch);
  }
  window.renderLesson = function(id) {
    const lesson = LESSONS.find(l => l.id === id);
    if (!lesson) return renderHome();
    const tableHtml = (tbl) => {
      if (!tbl) return '';
      const headers = tbl.headers || [];
      const rows = tbl.rows || tbl || [];
      return `<div class="table-scroll"><table class="lesson-table">${headers.length ? `<thead><tr>${headers.map(h=>`<th>${escapeHtml(String(h))}</th>`).join('')}</tr></thead>` : ''}<tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${escapeHtml(String(c))}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
    };
    const toc = (lesson.sections || []).map((s,i)=>`<a href="#sec-${i}">${i+1}. ${escapeHtml(s.title)}</a>`).join('');
    const sectionHtml = (lesson.sections || []).map((sec, si) => `
      <div class="lesson-section" id="sec-${si}">
        <h2>${si+1}. ${escapeHtml(sec.title)}</h2>
        <p>${escapeHtml(sec.body || '').replace(/\n/g, '<br>')}</p>
        ${(sec.steps && sec.steps.length) ? `<div class="step-list">${sec.steps.map((st, i) => `<div class="step"><b>${i+1}</b><span>${escapeHtml(st)}</span></div>`).join('')}</div>` : ''}
        ${sec.table ? tableHtml(sec.table) : ''}
      </div>`).join('');
    const examplesHtml = (lesson.examples || []).map((ex, i) => `
      <div class="card">
        <div class="example-block">
          <div class="title">⚡ Örnek ${i+1}: ${escapeHtml(ex.title)}</div>
          ${ex.explain ? `<p class="example-explain">${escapeHtml(ex.explain)}</p>` : ''}
          <div class="editor-wrap">
            <div class="editor-header"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div><div class="lbl">ornek-${id}-${i+1}.asm</div></div>
            <pre class="code code-asm">${highlightAsm(ex.code)}</pre>
          </div>
          ${(ex.trace && ex.trace.length) ? `<div class="trace-box"><strong>Adım adım:</strong><ol>${ex.trace.map(t => `<li>${escapeHtml(t)}</li>`).join('')}</ol></div>` : ''}
          <div class="toolbar"><button class="btn primary" onclick="openInSimulator(${JSON.stringify(ex.code).replace(/"/g, '&quot;')})">🧪 Simülatörde Aç</button><button class="btn ghost" onclick="copyText(${JSON.stringify(ex.code).replace(/"/g, '&quot;')})">📋 Kopyala</button></div>
        </div>
      </div>`).join('');
    const pitfallsHtml = (lesson.pitfalls || []).length ? `<div class="card warning-card"><h2>⚠️ Sık yapılan hatalar</h2>${(lesson.pitfalls || []).map(p => `<div class="pitfall"><b>${escapeHtml(p.bad)}</b><span>${escapeHtml(p.fix)}</span></div>`).join('')}</div>` : '';
    const quizHtml = (lesson.quiz || []).length ? `<div class="card quiz-card"><h2>Mini quiz</h2>${(lesson.quiz || []).map((q, i) => `<details class="quiz-item"><summary>${i+1}. ${escapeHtml(q.q)}</summary><div>${escapeHtml(q.a)}</div></details>`).join('')}</div>` : '';
    document.getElementById('main').innerHTML = `
      <button class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰ Menu</button>
      <div class="page-head"><h1>${lesson.icon} ${lesson.title}</h1><div class="sub">Bu ders sayfası tablo + mantık + çalışan örnek + hata tuzağı şeklinde full tekrar için düzenlendi.</div></div>
      <div class="quality-note"><b>Ders modu yenilendi:</b> Önce ana tabloyu oku, sonra örnekleri simülatörde çalıştır. Özellikle flag, I/O, addressing ve timer sayfalarında sınavlık tablolar eklendi.</div>
      <div class="lesson-intro">${escapeHtml(lesson.intro || '').replace(/\n/g, '<br>')}</div>
      ${lesson.goals ? `<div class="card"><h2>Bu dersten sonra şunları bilmen lazım</h2><div class="goal-grid">${lesson.goals.map(g => `<div class="goal">${escapeHtml(g)}</div>`).join('')}</div></div>` : ''}
      ${toc ? `<div class="card"><h2>Konu haritası</h2><div class="lesson-toc">${toc}</div></div>` : ''}
      ${sectionHtml}
      <div class="card"><h2>Çalışan örnekler</h2><p style="color:var(--text-dim)">Her örneği simülatörde açıp register, SREG, stack ve I/O değişimini adım adım görebilirsin.</p></div>
      ${examplesHtml}
      ${pitfallsHtml}
      ${quizHtml}
      <div class="card"><h3>Şimdi ne yapmalıyım?</h3><p>Bu dersi bitirince aynı konunun otomatik kontrollü pratiklerine geç. Zorlandığın komutu Komut Atlası'ndan aç.</p><button class="btn teal" onclick="goPracticeFiltered('${lesson.id}')">Bu konunun pratiklerine git →</button><button class="btn ghost" onclick="go('atlas')">Komut Atlası →</button></div>`;
  };
  // If opened directly on a lesson hash, re-render with upgraded renderer.
  if (location.hash && location.hash.replace(/^#/, '').startsWith('lesson:')) {
    setTimeout(()=>navigate(location.hash.replace(/^#/, '')), 0);
  }
})();

</script>

</html>
