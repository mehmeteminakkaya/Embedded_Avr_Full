<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AVR Akademi — Full PDF Uyumlu Ders Stüdyosu</title>
  <style>
/* ===== Renk paleti ===== */
:root {
  --bg:          #0B1220;
  --bg-2:        #111A2E;
  --bg-3:        #182441;
  --panel:       #14213D;
  --panel-2:     #1B2C57;
  --border:      #243B6A;
  --border-soft: #1C2A4E;
  --text:        #E6EDF7;
  --text-dim:    #9FB0CC;
  --text-mute:   #6B7C9C;

  --primary:     #5B8DEF;
  --primary-2:   #3B6FE0;
  --teal:        #2BD4C4;
  --teal-2:      #18B0A0;
  --gold:        #F5B945;
  --gold-2:      #E09A1D;
  --red:         #F26B6B;
  --red-2:       #C9404E;
  --green:       #4ADE80;
  --green-2:     #22A55B;
  --purple:      #B58CF2;

  --shadow:      0 10px 30px rgba(0,0,0,0.4);
  --shadow-2:    0 4px 12px rgba(0,0,0,0.3);
  --r-sm:        6px;
  --r-md:        10px;
  --r-lg:        16px;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  font-size: 14.5px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ===== Layout ===== */
.app {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: 100vh;
}
@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { position: fixed; left: -300px; top: 0; bottom: 0; z-index: 100; transition: left 0.25s ease; }
  .sidebar.open { left: 0; }
  .mobile-toggle { display: inline-flex !important; }
}

.sidebar {
  background: linear-gradient(180deg, #0F1729 0%, #0A1020 100%);
  border-right: 1px solid var(--border-soft);
  padding: 18px 16px;
  width: 280px;
  overflow-y: auto;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border-soft);
}
.brand-logo {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--primary), var(--teal));
  display: grid; place-items: center;
  font-weight: 800; color: #0B1220; font-size: 18px;
  box-shadow: var(--shadow-2);
}
.brand-text { line-height: 1.15; }
.brand-text .t1 { font-size: 14px; font-weight: 700; color: var(--text); }
.brand-text .t2 { font-size: 11px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 1px; }

.nav-section {
  margin-top: 18px;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-mute);
  padding: 0 6px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px;
  border-radius: var(--r-sm);
  cursor: pointer;
  color: var(--text-dim);
  font-size: 13.5px;
  margin-bottom: 2px;
  transition: all 0.15s;
  border: 1px solid transparent;
}
.nav-item:hover {
  background: var(--bg-2);
  color: var(--text);
}
.nav-item.active {
  background: linear-gradient(90deg, rgba(91,141,239,0.15) 0%, rgba(43,212,196,0.05) 100%);
  color: var(--text);
  border-color: var(--border);
  font-weight: 600;
}
.nav-item .ico { width: 18px; text-align: center; }
.nav-item .badge {
  margin-left: auto;
  background: var(--bg-3);
  color: var(--text-dim);
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 10.5px;
}

/* ===== Main content ===== */
.main {
  padding: 28px 32px 64px;
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
}
@media (max-width: 700px) {
  .main { padding: 16px; }
}

.mobile-toggle {
  display: none;
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 6px;
  padding: 6px 10px;
  margin-bottom: 14px;
  cursor: pointer;
}

.page-head {
  margin-bottom: 22px;
}
.page-head h1 {
  margin: 0 0 6px;
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
}
.page-head .sub {
  color: var(--text-dim);
  font-size: 14px;
}

/* Section card */
.card {
  background: var(--panel);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  padding: 18px 20px;
  margin-bottom: 18px;
  box-shadow: var(--shadow-2);
}
.card h2 {
  margin: 0 0 12px;
  font-size: 18px;
  color: var(--text);
}
.card h3 {
  margin: 0 0 8px;
  font-size: 14.5px;
  color: var(--teal);
  font-weight: 600;
}

/* Hero on home */
.hero {
  background: linear-gradient(135deg, #1A2845 0%, #11254A 100%);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 36px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}
.hero::after {
  content: "";
  position: absolute;
  right: -80px; top: -80px;
  width: 280px; height: 280px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(43,212,196,0.18), transparent 60%);
}
.hero h1 {
  margin: 0 0 8px;
  font-size: 32px;
  letter-spacing: -0.5px;
}
.hero .gold { color: var(--gold); }
.hero .teal { color: var(--teal); }
.hero p {
  color: var(--text-dim);
  font-size: 15px;
  max-width: 640px;
  margin: 6px 0;
}
.hero-stats {
  display: flex; gap: 24px;
  margin-top: 22px;
  flex-wrap: wrap;
}
.stat {
  background: rgba(11, 18, 32, 0.6);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 12px 18px;
  min-width: 130px;
}
.stat .n { font-size: 24px; font-weight: 700; color: var(--gold); }
.stat .l { color: var(--text-dim); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

.tile-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
  margin-top: 16px;
}
.tile {
  background: var(--bg-2);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  padding: 16px;
  cursor: pointer;
  transition: all 0.15s;
}
.tile:hover {
  border-color: var(--teal);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(43, 212, 196, 0.15);
}
.tile .ico { font-size: 24px; margin-bottom: 6px; }
.tile .t { font-weight: 600; margin-bottom: 4px; }
.tile .d { color: var(--text-dim); font-size: 12.5px; }

/* Lesson page */
.lesson-intro {
  background: rgba(43, 212, 196, 0.08);
  border-left: 3px solid var(--teal);
  border-radius: 6px;
  padding: 12px 16px;
  margin-bottom: 18px;
  color: var(--text);
}
.example-block {
  margin-bottom: 16px;
}
.example-block .title {
  font-weight: 600;
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}

/* Code editor (textarea) */
.editor-wrap {
  position: relative;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  overflow: hidden;
  background: #0A0F1C;
}
.editor-header {
  display: flex; align-items: center; gap: 10px;
  background: #0F162A;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border-soft);
}
.editor-header .dot { width: 10px; height: 10px; border-radius: 50%; }
.editor-header .dot.r { background: #F26B6B; }
.editor-header .dot.y { background: #F5B945; }
.editor-header .dot.g { background: #4ADE80; }
.editor-header .lbl { color: var(--text-mute); font-size: 12px; margin-left: 4px; }

.code-editor, pre.code {
  width: 100%;
  background: #0A0F1C;
  color: #E6EDF7;
  border: none;
  outline: none;
  padding: 14px 16px;
  font-family: "Fira Code", Consolas, Monaco, monospace;
  font-size: 13px;
  line-height: 1.55;
  white-space: pre;
  overflow: auto;
  resize: vertical;
  min-height: 160px;
  tab-size: 4;
  display: block;
  margin: 0;
}
pre.code { min-height: 0; max-height: 360px; }
.code-editor { min-height: 240px; }

.toolbar {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-top: 10px;
}
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--panel-2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { background: var(--bg-3); }
.btn.primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-2));
  border-color: var(--primary-2);
  color: #fff;
}
.btn.primary:hover { filter: brightness(1.1); }
.btn.teal {
  background: linear-gradient(135deg, var(--teal), var(--teal-2));
  border-color: var(--teal-2);
  color: #0B1220;
}
.btn.gold {
  background: linear-gradient(135deg, var(--gold), var(--gold-2));
  border-color: var(--gold-2);
  color: #0B1220;
}
.btn.ghost {
  background: transparent;
  color: var(--text-dim);
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Simulator output */
.sim-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-top: 14px;
}
@media (max-width: 800px) { .sim-row { grid-template-columns: 1fr; } }

.sim-panel {
  background: var(--bg-2);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  padding: 12px 14px;
}
.sim-panel h4 {
  margin: 0 0 8px;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-mute);
}

.regs-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  font-family: "Fira Code", Consolas, Monaco, monospace;
  font-size: 12px;
}
.reg {
  background: var(--bg);
  border: 1px solid var(--border-soft);
  border-radius: 4px;
  padding: 4px 6px;
  display: flex;
  justify-content: space-between;
  gap: 6px;
}
.reg .n { color: var(--text-mute); }
.reg .v { color: var(--teal); font-weight: 600; }
.reg.changed { border-color: var(--gold); background: rgba(245,185,69,0.08); }
.reg.changed .v { color: var(--gold); }

.flags {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.flag {
  background: var(--bg);
  border: 1px solid var(--border-soft);
  border-radius: 4px;
  padding: 4px 8px;
  font-family: "Fira Code", Consolas, Monaco, monospace;
  font-size: 12px;
  display: flex; gap: 4px;
}
.flag .n { color: var(--text-mute); }
.flag .v { font-weight: 700; }
.flag.set .v { color: var(--green); }
.flag.unset .v { color: var(--red); }

.led-bar {
  display: flex; gap: 4px;
  margin: 6px 0;
}
.led {
  width: 22px; height: 22px;
  border-radius: 4px;
  background: #222;
  border: 1px solid #1a1a1a;
  display: grid; place-items: center;
  font-size: 9px;
  color: #444;
}
.led.on {
  background: radial-gradient(circle at 30% 30%, #FFE48C, #F5B945 70%);
  border-color: #C99417;
  color: #6E4900;
  box-shadow: 0 0 8px rgba(245, 185, 69, 0.6);
}

.mem-box {
  background: var(--bg);
  border: 1px solid var(--border-soft);
  border-radius: 6px;
  padding: 8px 10px;
  font-family: "Fira Code", Consolas, Monaco, monospace;
  font-size: 12px;
  max-height: 180px;
  overflow: auto;
}

.console {
  background: #06090F;
  border: 1px solid var(--border-soft);
  border-radius: 6px;
  padding: 10px 12px;
  font-family: "Fira Code", Consolas, Monaco, monospace;
  font-size: 12px;
  max-height: 220px;
  overflow: auto;
  color: var(--text);
  white-space: pre-wrap;
  margin-top: 12px;
}
.console .err { color: var(--red); font-weight: 600; }
.console .ok { color: var(--green); font-weight: 600; }
.console .info { color: var(--teal); }

/* Practice */
.problem {
  background: var(--panel);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  padding: 16px 18px;
  margin-bottom: 14px;
}
.problem-head {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.problem .level {
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 700;
}
.problem .level.kolay { background: rgba(74,222,128,0.15); color: var(--green); border: 1px solid var(--green-2); }
.problem .level.orta { background: rgba(245,185,69,0.15); color: var(--gold); border: 1px solid var(--gold-2); }
.problem .level.zor { background: rgba(242,107,107,0.15); color: var(--red); border: 1px solid var(--red-2); }
.problem .topic { font-size: 11px; color: var(--text-mute); }
.problem .title { font-weight: 600; font-size: 15px; }
.problem .desc { color: var(--text-dim); margin: 8px 0 12px; }
.problem .status {
  margin-left: auto;
  font-size: 11px;
}
.problem .status.done { color: var(--green); }

.collapse {
  border-top: 1px solid var(--border-soft);
  margin-top: 12px;
  padding-top: 12px;
}
.collapse-header {
  display: flex; gap: 8px; align-items: center;
  cursor: pointer;
  color: var(--text-dim);
  font-size: 12.5px;
  user-select: none;
}
.collapse-content { display: none; margin-top: 8px; }
.collapse.open .collapse-content { display: block; }
.collapse.open .chev { transform: rotate(90deg); }
.chev { transition: transform 0.15s; display: inline-block; }

.filter-bar {
  display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
}
.chip {
  background: var(--bg-2);
  border: 1px solid var(--border-soft);
  border-radius: 14px;
  padding: 5px 12px;
  font-size: 12px;
  cursor: pointer;
  color: var(--text-dim);
  transition: all 0.15s;
}
.chip:hover { color: var(--text); border-color: var(--border); }
.chip.active {
  background: var(--bg-3);
  border-color: var(--teal);
  color: var(--text);
  font-weight: 600;
}

/* Progress */
.progress-bar {
  background: var(--bg-2);
  border-radius: 6px;
  height: 8px;
  overflow: hidden;
  margin: 6px 0 16px;
}
.progress-bar .fill {
  background: linear-gradient(90deg, var(--teal), var(--green));
  height: 100%;
  transition: width 0.3s;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  padding: 12px 18px;
  border-radius: var(--r-md);
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 13px;
  box-shadow: var(--shadow);
  z-index: 200;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.25s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { border-color: var(--green); background: linear-gradient(135deg, rgba(74,222,128,0.15), var(--panel)); }
.toast.error { border-color: var(--red); background: linear-gradient(135deg, rgba(242,107,107,0.15), var(--panel)); }

/* Code highlight (basic, for visible code) */
.code-asm .kw   { color: #5B8DEF; font-weight: 600; }
.code-asm .reg  { color: #F5B945; }
.code-asm .num  { color: #2BD4C4; }
.code-asm .com  { color: #6B7C9C; font-style: italic; }
.code-asm .lbl  { color: #B58CF2; }

/* Tabs (used inside lab cards etc.) */
.tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--border-soft);
  margin-bottom: 12px;
}
.tab {
  padding: 8px 16px;
  background: transparent;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  font-size: 13px;
  font-weight: 600;
}
.tab.active { color: var(--text); border-bottom-color: var(--teal); }
.tab:hover { color: var(--text); }

/* Misc */
hr { border: none; border-top: 1px solid var(--border-soft); margin: 16px 0; }
a { color: var(--teal); text-decoration: none; }
a:hover { text-decoration: underline; }
kbd {
  background: var(--bg-2);
  border: 1px solid var(--border-soft);
  border-bottom-width: 2px;
  border-radius: 4px;
  padding: 1px 6px;
  font-family: "Fira Code", Consolas, monospace;
  font-size: 11.5px;
  color: var(--text);
}

/* Scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 5px; }
::-webkit-scrollbar-thumb:hover { background: var(--border); }

/* FIX: assembly syntax highlight span'leri register grid CSS'iyle çakışmasın. */
.code-asm .kw, .code-asm .reg, .code-asm .num, .code-asm .com, .code-asm .lbl {
  display: inline !important;
  background: transparent !important;
  border: 0 !important;
  border-radius: 0 !important;
  padding: 0 !important;
  gap: 0 !important;
  justify-content: initial !important;
}
.code-asm .kw   { color: #5B8DEF !important; font-weight: 600; }
.code-asm .reg  { color: #F5B945 !important; }
.code-asm .num  { color: #2BD4C4 !important; }
.code-asm .com  { color: #6B7C9C !important; font-style: italic; }

  <script>
/* =====================================================================
   AVR Assembly Simulator (basitlestirilmis - egitim amaclidir)
   Destekledigi komutlar:
     Data: LDI, MOV, LDS, STS, IN, OUT, LD, ST (X/Y/Z, X+/Y+/Z+, -X/-Y/-Z)
     Arit: ADD, ADC, SUB, SUBI, SBC, SBCI, INC, DEC, NEG, COM, CLR, SER
     Logic: AND, ANDI, OR, ORI, EOR, TST
     Shift: LSL, LSR, ASR, ROL, ROR
     Compare: CP, CPI, CPC
     Branch: BREQ, BRNE, BRCS, BRCC, BRLO, BRSH, BRMI, BRPL, BRLT, BRGE
     Jump: JMP, RJMP
     Call: CALL, RCALL, RET
     Stack: PUSH, POP
     I/O bit: SBI, CBI, SBIC, SBIS
     Reg bit: SBRC, SBRS
     Misc: NOP, SEI, CLI, SEC, CLC, SEZ, CLZ
   ===================================================================== */

const IO_ADDR = {
  PINB: 0x23, DDRB: 0x24, PORTB: 0x25,
  PINC: 0x26, DDRC: 0x27, PORTC: 0x28,
  PIND: 0x29, DDRD: 0x2A, PORTD: 0x2B,
  TIFR0: 0x35, TIFR1: 0x36, TIFR2: 0x37,
  EIFR: 0x3C, EIMSK: 0x3D,
  GPIOR0: 0x3E,
  EECR: 0x3F, EEDR: 0x40, EEARL: 0x41, EEARH: 0x42,
  GTCCR: 0x43, TCCR0A: 0x44, TCCR0B: 0x45, TCNT0: 0x46, OCR0A: 0x47, OCR0B: 0x48,
  GPIOR1: 0x4A, GPIOR2: 0x4B,
  SPCR: 0x4C, SPSR: 0x4D, SPDR: 0x4E,
  ACSR: 0x50,
  SMCR: 0x53, MCUSR: 0x54, MCUCR: 0x55,
  SPMCSR: 0x57,
  SPL: 0x5D, SPH: 0x5E, SREG: 0x5F,
  WDTCSR: 0x60, CLKPR: 0x61,
  PRR: 0x64, OSCCAL: 0x66, PCICR: 0x68, EICRA: 0x69,
  PCMSK0: 0x6B, PCMSK1: 0x6C, PCMSK2: 0x6D,
  TIMSK0: 0x6E, TIMSK1: 0x6F, TIMSK2: 0x70,
  ADCL: 0x78, ADCH: 0x79, ADCSRA: 0x7A, ADCSRB: 0x7B, ADMUX: 0x7C,
  DIDR0: 0x7E, DIDR1: 0x7F,
  TCCR1A: 0x80, TCCR1B: 0x81, TCCR1C: 0x82,
  TCNT1L: 0x84, TCNT1H: 0x85, ICR1L: 0x86, ICR1H: 0x87,
  OCR1AL: 0x88, OCR1AH: 0x89, OCR1BL: 0x8A, OCR1BH: 0x8B,
  TCCR2A: 0xB0, TCCR2B: 0xB1, TCNT2: 0xB2, OCR2A: 0xB3, OCR2B: 0xB4, ASSR: 0xB6,
  TWBR: 0xB8, TWSR: 0xB9, TWAR: 0xBA, TWDR: 0xBB, TWCR: 0xBC, TWAMR: 0xBD,
  UCSR0A: 0xC0, UCSR0B: 0xC1, UCSR0C: 0xC2,
  UBRR0L: 0xC4, UBRR0H: 0xC5, UDR0: 0xC6
};

// Bit name -> bit index, for common SBI/CBI usage
const BIT_NAMES = {
  // SREG
  C: 0, Z: 1, N: 2, V: 3, S: 4, H: 5, T: 6, I: 7,
  // Generic pin/bit positions (most are just numeric, but provide common ones)
  PB0:0, PB1:1, PB2:2, PB3:3, PB4:4, PB5:5, PB6:6, PB7:7,
  PC0:0, PC1:1, PC2:2, PC3:3, PC4:4, PC5:5, PC6:6, PC7:7,
  PD0:0, PD1:1, PD2:2, PD3:3, PD4:4, PD5:5, PD6:6, PD7:7,
  TOV0: 0, OCF0A: 1, OCF0B: 2,
  TOV1: 0, OCF1A: 1, OCF1B: 2, ICF1: 5,
  EERE: 0, EEPE: 1, EEMPE: 2, EERIE: 3,
  TXEN0: 3, RXEN0: 4, UDRE0: 5, TXC0: 6, RXC0: 7, RXCIE0: 7, TXCIE0: 6, UDRIE0: 5, UCSZ02: 2, RXB80: 1, TXB80: 0, FE0: 4, DOR0: 3, PE0: 2, U2X0: 1, MPCM0: 0, UMSEL00: 6, UMSEL01: 7, UPM00: 4, UPM01: 5, USBS0: 3, UCSZ00: 1, UCSZ01: 2, UCPOL0: 0,
  WGM00: 0, WGM01: 1, WGM02: 3,
  CS00: 0, CS01: 1, CS02: 2,
  CS10: 0, CS11: 1, CS12: 2,
  TOIE0: 0, OCIE0A: 1, OCIE0B: 2,
  TOIE1: 0, OCIE1A: 1, OCIE1B: 2,
  INT0: 0, INT1: 1,
  ISC00: 0, ISC01: 1, ISC10: 2, ISC11: 3,
  PCIE0: 0, PCIE1: 1, PCIE2: 2,
  TWEN: 2, TWWC: 3, TWSTO: 4, TWSTA: 5, TWEA: 6, TWINT: 7, TWIE: 0,
  SPIE: 7, SPE: 6, DORD: 5, MSTR: 4, CPOL: 3, CPHA: 2, SPR1: 1, SPR0: 0,
  SPIF: 7, WCOL: 6, SPI2X: 0,
  ADEN: 7, ADSC: 6, ADIF: 4, ADIE: 3
};

const RAMEND = 0x08FF; // ATmega328 SRAM ends at 0x08FF

function parseRegister(token, line) {
  if (!token) throw new Error(`Satir ${line}: register bekleniyordu`);
  const t = token.toUpperCase();
  // X/Y/Z register pairs handled separately, but XL/XH etc. are aliases
  const aliases = { XL: 26, XH: 27, YL: 28, YH: 29, ZL: 30, ZH: 31 };
  if (aliases[t] !== undefined) return aliases[t];
  if (!/^R(\d{1,2})$/.test(t)) throw new Error(`Satir ${line}: register bekleniyordu, '${token}' bulundu`);
  const n = parseInt(t.slice(1), 10);
  if (n < 0 || n > 31) throw new Error(`Satir ${line}: register R${n} gecersiz (R0-R31)`);
  return n;
}

function parseImmediate(token, line, equs) {
  if (token === undefined || token === null) throw new Error(`Satir ${line}: sayi bekleniyordu`);
  let t = String(token).trim();
  // Char literal: 'A' -> 65
  t = t.replace(/'(.)'/g, (m, ch) => String(ch.charCodeAt(0)));
  // Allow $hh or 0xhh or 0bxx or decimal
  // Allow simple expressions: (1<<5)|(1<<2), HIGH(x), LOW(x), and basic + - * / & | ^
  // Replace .EQU names with their values
  t = t.replace(/\b([A-Za-z_][A-Za-z0-9_]*)\b/g, (m) => {
    const up = m.toUpperCase();
    if (equs[up] !== undefined) return `(${equs[up]})`;
    if (BIT_NAMES[up] !== undefined) return BIT_NAMES[up];
    if (IO_ADDR[up] !== undefined) return IO_ADDR[up];
    if (up === 'RAMEND') return RAMEND;
    if (up === 'HIGH') return 'HIGH_FN';
    if (up === 'LOW') return 'LOW_FN';
    return m;
  });
  // Convert $hh and 0xhh and 0bxx into JS numeric form
  t = t.replace(/\$([0-9A-Fa-f]+)/g, '0x$1');
  // Implement HIGH(n) and LOW(n) via wrap
  // Replace HIGH_FN(x) and LOW_FN(x)
  function evalExpr(expr) {
    // wrap HIGH/LOW
    expr = expr.replace(/HIGH_FN\(([^)]+)\)/g, '(((($1))>>8)&0xFF)');
    expr = expr.replace(/LOW_FN\(([^)]+)\)/g, '((($1))&0xFF)');
    // Only allow a safe subset
    if (!/^[\s0-9xXbBoO()|&^+\-*/<>!~,.A-F]+$/.test(expr.replace(/0x[0-9A-Fa-f]+/g,'0').replace(/0b[01]+/g,'0'))) {
      // be lenient — allow letters too
    }
    try {
      // eslint-disable-next-line no-new-func
      const v = Function('"use strict"; return (' + expr + ');')();
      if (typeof v !== 'number' || !isFinite(v)) throw 0;
      return v | 0;
    } catch (e) {
      throw new Error(`Satir ${line}: sayisal ifade hatasi: '${token}'`);
    }
  }
  return evalExpr(t);
}

function parseAddress(token, line, equs) {
  return parseImmediate(token, line, equs);
}

// Map textual I/O register name to I/O address (used by IN/OUT, SBI/CBI/SBIC/SBIS)
function parseIoReg(token, line, equs) {
  const up = String(token).trim().toUpperCase();
  if (IO_ADDR[up] !== undefined) return IO_ADDR[up];
  return parseImmediate(token, line, equs);
}

class AVRSim {
  constructor() {
    this.reset();
    this.maxSteps = 200000;
    this.output = [];
    this.onIOUpdate = null; // callback when PORTx changes
  }

  reset() {
    this.regs = new Uint8Array(32);
    this.io = new Uint8Array(0x100);
    this.sram = new Uint8Array(2048);
    this.pc = 0;
    this.cycles = 0;
    this.stepsExecuted = 0;
    this.halted = false;
    this.error = null;
    this.output = [];
    // SREG = 0
    this.io[IO_ADDR.SREG] = 0;
    this.io[IO_ADDR.SPL] = RAMEND & 0xFF;
    this.io[IO_ADDR.SPH] = (RAMEND >> 8) & 0xFF;
    this.io[IO_ADDR.PINB] = 0;
    this.io[IO_ADDR.PINC] = 0;
    this.io[IO_ADDR.PIND] = 0;
  }

  // ===== SREG helpers =====
  get sreg() { return this.io[IO_ADDR.SREG]; }
  set sreg(v) { this.io[IO_ADDR.SREG] = v & 0xFF; }
  getFlag(bit) { return (this.sreg >> bit) & 1; }
  setFlag(bit, v) { if (v) this.sreg = this.sreg | (1<<bit); else this.sreg = this.sreg & ~(1<<bit) & 0xFF; }
  get C() { return this.getFlag(0); }  set C(v) { this.setFlag(0, v); }
  get Z() { return this.getFlag(1); }  set Z(v) { this.setFlag(1, v); }
  get N() { return this.getFlag(2); }  set N(v) { this.setFlag(2, v); }
  get V() { return this.getFlag(3); }  set V(v) { this.setFlag(3, v); }
  get S() { return this.getFlag(4); }  set S(v) { this.setFlag(4, v); }
  get H() { return this.getFlag(5); }  set H(v) { this.setFlag(5, v); }
  get T() { return this.getFlag(6); }  set T(v) { this.setFlag(6, v); }
  get I() { return this.getFlag(7); }  set I(v) { this.setFlag(7, v); }

  // ===== Stack =====
  get SP() { return (this.io[IO_ADDR.SPH] << 8) | this.io[IO_ADDR.SPL]; }
  set SP(v) {
    this.io[IO_ADDR.SPL] = v & 0xFF;
    this.io[IO_ADDR.SPH] = (v >> 8) & 0xFF;
  }
  push(v) {
    const sp = this.SP;
    this.writeMem(sp, v & 0xFF);
    this.SP = (sp - 1) & 0xFFFF;
  }
  pop() {
    let sp = (this.SP + 1) & 0xFFFF;
    this.SP = sp;
    return this.readMem(sp);
  }

  // ===== Memory access =====
  writeMem(addr, val) {
    addr &= 0xFFFF; val &= 0xFF;
    if (addr < 32) { this.regs[addr] = val; return; }
    if (addr < 0x100) {
      this.io[addr] = val;
      if (this.onIOUpdate) this.onIOUpdate(addr, val);
      return;
    }
    // SRAM is 0x100 .. 0x100 + 2048
    const idx = addr - 0x100;
    if (idx >= 0 && idx < this.sram.length) this.sram[idx] = val;
  }
  readMem(addr) {
    addr &= 0xFFFF;
    if (addr < 32) return this.regs[addr];
    if (addr < 0x100) return this.io[addr];
    const idx = addr - 0x100;
    if (idx >= 0 && idx < this.sram.length) return this.sram[idx];
    return 0;
  }

  // ===== X/Y/Z pair =====
  getPair(which) {
    if (which === 'X') return (this.regs[27] << 8) | this.regs[26];
    if (which === 'Y') return (this.regs[29] << 8) | this.regs[28];
    if (which === 'Z') return (this.regs[31] << 8) | this.regs[30];
    return 0;
  }
  setPair(which, v) {
    v &= 0xFFFF;
    if (which === 'X') { this.regs[26] = v & 0xFF; this.regs[27] = (v>>8)&0xFF; }
    if (which === 'Y') { this.regs[28] = v & 0xFF; this.regs[29] = (v>>8)&0xFF; }
    if (which === 'Z') { this.regs[30] = v & 0xFF; this.regs[31] = (v>>8)&0xFF; }
  }

  log(msg) { this.output.push(msg); }

  // ===== Parse program =====
  load(source) {
    this.reset();
    const lines = source.split(/\r?\n/);
    const program = []; // list of {op, args, line}
    const labels = {};
    const equs = {};
    const orgStack = [];
    let pc = 0;
    for (let li = 0; li < lines.length; li++) {
      let raw = lines[li];
      const commentIdx = raw.indexOf(';');
      if (commentIdx >= 0) raw = raw.slice(0, commentIdx);
      raw = raw.replace(/\/\/.*/, '');
      raw = raw.trim();
      if (!raw) continue;
      // Handle label
      while (true) {
        const m = raw.match(/^([A-Za-z_][A-Za-z0-9_]*)\s*:\s*(.*)$/);
        if (!m) break;
        labels[m[1].toUpperCase()] = pc;
        raw = m[2].trim();
        if (!raw) break;
      }
      if (!raw) continue;
      // Handle .EQU / .SET / .ORG / .DEF
      const dot = raw.match(/^\.(\w+)\s+(.*)$/);
      if (dot) {
        const directive = dot[1].toUpperCase();
        const rest = dot[2];
        if (directive === 'EQU' || directive === 'SET') {
          // NAME = value
          const m2 = rest.match(/^([A-Za-z_][A-Za-z0-9_]*)\s*=\s*(.*)$/);
          if (!m2) throw new Error(`Satir ${li+1}: .EQU/.SET formati hatali`);
          equs[m2[1].toUpperCase()] = parseImmediate(m2[2], li+1, equs);
          continue;
        }
        if (directive === 'DEF') {
          const m2 = rest.match(/^([A-Za-z_][A-Za-z0-9_]*)\s*=\s*([A-Za-z_][A-Za-z0-9_]*)$/);
          if (!m2) throw new Error(`Satir ${li+1}: .DEF formati hatali`);
          equs[m2[1].toUpperCase()] = parseRegister(m2[2], li+1);
          continue;
        }
        if (directive === 'ORG') { /* ignore for our simplified model */ continue; }
        if (directive === 'INCLUDE') continue;
        if (directive === 'DB' || directive === 'DW') continue;
        // Skip unknown directives without erroring
        continue;
      }
      // Instruction
      const parts = raw.split(/\s+/);
      const opTok = parts.shift().toUpperCase();
      const rest = parts.join(' ');
      const args = rest ? rest.split(',').map(s => s.trim()) : [];
      program.push({ op: opTok, args, line: li+1, raw });
      pc++;
    }
    this.program = program;
    this.labels = labels;
    this.equs = equs;
    this.pc = 0;
  }

  // ===== ALU helpers =====
  add8(a, b, withCarry = false) {
    const c = withCarry ? this.C : 0;
    const r = (a + b + c) & 0xFF;
    this.H = (((a & 0xF) + (b & 0xF) + c) > 0xF) ? 1 : 0;
    this.C = ((a + b + c) > 0xFF) ? 1 : 0;
    this.Z = (r === 0) ? 1 : 0;
    this.N = (r >> 7) & 1;
    const sa = a & 0x80, sb = b & 0x80, sr = r & 0x80;
    this.V = (sa === sb && sa !== sr) ? 1 : 0;
    this.S = this.N ^ this.V;
    return r;
  }
  sub8(a, b, withCarry = false) {
    const c = withCarry ? this.C : 0;
    const r = (a - b - c) & 0xFF;
    this.H = ((((a & 0xF) - (b & 0xF) - c) & 0x10) !== 0) ? 1 : 0;
    this.C = (((a - b - c) & 0x100) !== 0) ? 1 : 0;
    this.N = (r >> 7) & 1;
    const sa = a & 0x80, sb = b & 0x80, sr = r & 0x80;
    this.V = (sa !== sb && sa !== sr) ? 1 : 0;
    this.S = this.N ^ this.V;
    // Z for subtract: special handling for SBC vs SUB (Z stays if r==0 OR for SBC preserved)
    this.Z = (r === 0) ? 1 : 0;
    return r;
  }
  logicUpdateSREG(r) {
    r &= 0xFF;
    this.Z = (r === 0) ? 1 : 0;
    this.N = (r >> 7) & 1;
    this.V = 0;
    this.S = this.N ^ this.V;
  }

  // ===== Operand parsing helpers (resolved at exec) =====
  parseLabelTarget(token, line) {
    const up = String(token).trim().toUpperCase();
    if (this.labels[up] !== undefined) return this.labels[up];
    throw new Error(`Satir ${line}: '${token}' etiketi bulunamadi`);
  }

  // ===== Indirect addressing parse =====
  parseIndirect(token, line) {
    // Accepts X, Y, Z, X+, Y+, Z+, -X, -Y, -Z, Y+q, Z+q
    let t = String(token).trim().toUpperCase();
    if (t === 'X' || t === 'Y' || t === 'Z') return { reg: t, mode: 'NONE', disp: 0 };
    if (t === 'X+' || t === 'Y+' || t === 'Z+') return { reg: t[0], mode: 'POST_INC', disp: 0 };
    if (t === '-X' || t === '-Y' || t === '-Z') return { reg: t[1], mode: 'PRE_DEC', disp: 0 };
    // Y+q or Z+q
    const m = t.match(/^([YZ])\+(\d+)$/);
    if (m) return { reg: m[1], mode: 'DISP', disp: parseInt(m[2], 10) };
    throw new Error(`Satir ${line}: dolayli adresleme operand'i tanimsiz: '${token}'`);
  }

  // ===== Execute one instruction =====
  step() {
    if (this.halted || this.error) return false;
    if (this.pc < 0 || this.pc >= this.program.length) { this.halted = true; return false; }
    const instr = this.program[this.pc];
    let nextPc = this.pc + 1;
    const { op, args, line } = instr;
    try {
      switch (op) {
        case 'NOP': this.cycles += 1; break;

        case 'LDI': {
          const rd = parseRegister(args[0], line);
          if (rd < 16) throw new Error(`Satir ${line}: LDI sadece R16-R31 destekler (R${rd} verildi)`);
          const k = parseImmediate(args[1], line, this.equs) & 0xFF;
          this.regs[rd] = k;
          this.cycles += 1;
          break;
        }
        case 'MOV': {
          const rd = parseRegister(args[0], line);
          const rr = parseRegister(args[1], line);
          this.regs[rd] = this.regs[rr];
          this.cycles += 1;
          break;
        }
        case 'CLR': {
          const rd = parseRegister(args[0], line);
          this.regs[rd] = 0;
          this.Z = 1; this.N = 0; this.V = 0; this.S = 0;
          this.cycles += 1;
          break;
        }
        case 'SER': {
          const rd = parseRegister(args[0], line);
          if (rd < 16) throw new Error(`Satir ${line}: SER sadece R16-R31`);
          this.regs[rd] = 0xFF;
          this.cycles += 1;
          break;
        }
        case 'TST': {
          const rd = parseRegister(args[0], line);
          this.logicUpdateSREG(this.regs[rd]);
          this.cycles += 1;
          break;
        }

        case 'ADD': {
          const rd = parseRegister(args[0], line);
          const rr = parseRegister(args[1], line);
          this.regs[rd] = this.add8(this.regs[rd], this.regs[rr], false);
          this.cycles += 1;
          break;
        }
        case 'ADC': {
          const rd = parseRegister(args[0], line);
          const rr = parseRegister(args[1], line);
          this.regs[rd] = this.add8(this.regs[rd], this.regs[rr], true);
          this.cycles += 1;
          break;
        }
        case 'SUB': {
          const rd = parseRegister(args[0], line);
          const rr = parseRegister(args[1], line);
          this.regs[rd] = this.sub8(this.regs[rd], this.regs[rr], false);
          this.cycles += 1;
          break;
        }
        case 'SBC': {
          const rd = parseRegister(args[0], line);
          const rr = parseRegister(args[1], line);
          const prevZ = this.Z;
          const r = this.sub8(this.regs[rd], this.regs[rr], true);
          this.regs[rd] = r;
          if (r !== 0) this.Z = 0;
          else this.Z = prevZ; // preserved if r==0
          this.cycles += 1;
          break;
        }
        case 'SUBI': {
          const rd = parseRegister(args[0], line);
          if (rd < 16) throw new Error(`Satir ${line}: SUBI sadece R16-R31`);
          const k = parseImmediate(args[1], line, this.equs) & 0xFF;
          this.regs[rd] = this.sub8(this.regs[rd], k, false);
          this.cycles += 1;
          break;
        }
        case 'SBCI': {
          const rd = parseRegister(args[0], line);
          if (rd < 16) throw new Error(`Satir ${line}: SBCI sadece R16-R31`);
          const k = parseImmediate(args[1], line, this.equs) & 0xFF;
          const prevZ = this.Z;
          const r = this.sub8(this.regs[rd], k, true);
          this.regs[rd] = r;
          if (r !== 0) this.Z = 0;
          else this.Z = prevZ;
          this.cycles += 1;
          break;
        }
        case 'INC': {
          const rd = parseRegister(args[0], line);
          const r = (this.regs[rd] + 1) & 0xFF;
          this.regs[rd] = r;
          this.Z = (r === 0) ? 1 : 0;
          this.N = (r >> 7) & 1;
          this.V = (r === 0x80) ? 1 : 0;
          this.S = this.N ^ this.V;
          this.cycles += 1;
          break;
        }
        case 'DEC': {
          const rd = parseRegister(args[0], line);
          const r = (this.regs[rd] - 1) & 0xFF;
          this.regs[rd] = r;
          this.Z = (r === 0) ? 1 : 0;
          this.N = (r >> 7) & 1;
          this.V = (r === 0x7F) ? 1 : 0;
          this.S = this.N ^ this.V;
          this.cycles += 1;
          break;
        }
        case 'NEG': {
          const rd = parseRegister(args[0], line);
          const a = this.regs[rd];
          const r = (0 - a) & 0xFF;
          this.regs[rd] = r;
          this.H = (((r & 0xF) | (a & 0xF)) !== 0) ? 1 : 0;
          this.C = (r !== 0) ? 1 : 0;
          this.Z = (r === 0) ? 1 : 0;
          this.N = (r >> 7) & 1;
          this.V = (r === 0x80) ? 1 : 0;
          this.S = this.N ^ this.V;
          this.cycles += 1;
          break;
        }
        case 'COM': {
          const rd = parseRegister(args[0], line);
          const r = (0xFF - this.regs[rd]) & 0xFF;
          this.regs[rd] = r;
          this.C = 1;
          this.Z = (r === 0) ? 1 : 0;
          this.N = (r >> 7) & 1;
          this.V = 0;
          this.S = this.N ^ this.V;
          this.cycles += 1;
          break;
        }

        case 'AND': {
          const rd = parseRegister(args[0], line);
          const rr = parseRegister(args[1], line);
          this.regs[rd] = this.regs[rd] & this.regs[rr];
          this.logicUpdateSREG(this.regs[rd]);
          this.cycles += 1;
          break;
        }
        case 'ANDI': {
          const rd = parseRegister(args[0], line);
          if (rd < 16) throw new Error(`Satir ${line}: ANDI sadece R16-R31`);
          const k = parseImmediate(args[1], line, this.equs) & 0xFF;
          this.regs[rd] = this.regs[rd] & k;
          this.logicUpdateSREG(this.regs[rd]);
          this.cycles += 1;
          break;
        }
        case 'OR': {
          const rd = parseRegister(args[0], line);
          const rr = parseRegister(args[1], line);
          this.regs[rd] = this.regs[rd] | this.regs[rr];
          this.logicUpdateSREG(this.regs[rd]);
          this.cycles += 1;
          break;
        }
        case 'ORI': case 'SBR': {
          const rd = parseRegister(args[0], line);
          if (rd < 16) throw new Error(`Satir ${line}: ORI/SBR sadece R16-R31`);
          const k = parseImmediate(args[1], line, this.equs) & 0xFF;
          this.regs[rd] = this.regs[rd] | k;
          this.logicUpdateSREG(this.regs[rd]);
          this.cycles += 1;
          break;
        }
        case 'CBR': {
          const rd = parseRegister(args[0], line);
          if (rd < 16) throw new Error(`Satir ${line}: CBR sadece R16-R31`);
          const k = parseImmediate(args[1], line, this.equs) & 0xFF;
          this.regs[rd] = this.regs[rd] & ((~k) & 0xFF);
          this.logicUpdateSREG(this.regs[rd]);
          this.cycles += 1;
          break;
        }
        case 'EOR': {
          const rd = parseRegister(args[0], line);
          const rr = parseRegister(args[1], line);
          this.regs[rd] = (this.regs[rd] ^ this.regs[rr]) & 0xFF;
          this.logicUpdateSREG(this.regs[rd]);
          this.cycles += 1;
          break;
        }

        case 'LSL': case 'ASL': {
          const rd = parseRegister(args[0], line);
          const a = this.regs[rd];
          const r = (a << 1) & 0xFF;
          this.regs[rd] = r;
          this.C = (a >> 7) & 1;
          this.H = (a >> 3) & 1;
          this.Z = (r === 0) ? 1 : 0;
          this.N = (r >> 7) & 1;
          this.V = this.N ^ this.C;
          this.S = this.N ^ this.V;
          this.cycles += 1;
          break;
        }
        case 'LSR': {
          const rd = parseRegister(args[0], line);
          const a = this.regs[rd];
          const r = a >> 1;
          this.regs[rd] = r;
          this.C = a & 1;
          this.N = 0;
          this.Z = (r === 0) ? 1 : 0;
          this.V = this.N ^ this.C;
          this.S = this.N ^ this.V;
          this.cycles += 1;
          break;
        }
        case 'ASR': {
          const rd = parseRegister(args[0], line);
          const a = this.regs[rd];
          const r = (a >> 1) | (a & 0x80);
          this.regs[rd] = r;
          this.C = a & 1;
          this.N = (r >> 7) & 1;
          this.Z = (r === 0) ? 1 : 0;
          this.V = this.N ^ this.C;
          this.S = this.N ^ this.V;
          this.cycles += 1;
          break;
        }
        case 'ROL': {
          const rd = parseRegister(args[0], line);
          const a = this.regs[rd];
          const r = ((a << 1) | this.C) & 0xFF;
          this.regs[rd] = r;
          this.C = (a >> 7) & 1;
          this.H = (a >> 3) & 1;
          this.Z = (r === 0) ? 1 : 0;
          this.N = (r >> 7) & 1;
          this.V = this.N ^ this.C;
          this.S = this.N ^ this.V;
          this.cycles += 1;
          break;
        }
        case 'ROR': {
          const rd = parseRegister(args[0], line);
          const a = this.regs[rd];
          const r = ((this.C << 7) | (a >> 1)) & 0xFF;
          this.regs[rd] = r;
          this.C = a & 1;
          this.N = (r >> 7) & 1;
          this.Z = (r === 0) ? 1 : 0;
          this.V = this.N ^ this.C;
          this.S = this.N ^ this.V;
          this.cycles += 1;
          break;
        }
        case 'SWAP': {
          const rd = parseRegister(args[0], line);
          const a = this.regs[rd];
          this.regs[rd] = ((a >> 4) | (a << 4)) & 0xFF;
          this.cycles += 1;
          break;
        }

        case 'CP': {
          const rd = parseRegister(args[0], line);
          const rr = parseRegister(args[1], line);
          this.sub8(this.regs[rd], this.regs[rr], false); // discard result, flags updated
          this.cycles += 1;
          break;
        }
        case 'CPI': {
          const rd = parseRegister(args[0], line);
          if (rd < 16) throw new Error(`Satir ${line}: CPI sadece R16-R31`);
          const k = parseImmediate(args[1], line, this.equs) & 0xFF;
          this.sub8(this.regs[rd], k, false);
          this.cycles += 1;
          break;
        }
        case 'CPC': {
          const rd = parseRegister(args[0], line);
          const rr = parseRegister(args[1], line);
          const prevZ = this.Z;
          const r = this.sub8(this.regs[rd], this.regs[rr], true);
          if (r !== 0) this.Z = 0;
          else this.Z = prevZ;
          this.cycles += 1;
          break;
        }

        // Branches: each takes 1 cycle if not taken, 2 if taken
        case 'BREQ': nextPc = this.branchIf(this.Z === 1, args[0], line, nextPc); break;
        case 'BRNE': nextPc = this.branchIf(this.Z === 0, args[0], line, nextPc); break;
        case 'BRCS': case 'BRLO': nextPc = this.branchIf(this.C === 1, args[0], line, nextPc); break;
        case 'BRCC': case 'BRSH': nextPc = this.branchIf(this.C === 0, args[0], line, nextPc); break;
        case 'BRMI': nextPc = this.branchIf(this.N === 1, args[0], line, nextPc); break;
        case 'BRPL': nextPc = this.branchIf(this.N === 0, args[0], line, nextPc); break;
        case 'BRLT': nextPc = this.branchIf(this.S === 1, args[0], line, nextPc); break;
        case 'BRGE': nextPc = this.branchIf(this.S === 0, args[0], line, nextPc); break;
        case 'BRVS': nextPc = this.branchIf(this.V === 1, args[0], line, nextPc); break;
        case 'BRVC': nextPc = this.branchIf(this.V === 0, args[0], line, nextPc); break;
        case 'BRTS': nextPc = this.branchIf(this.T === 1, args[0], line, nextPc); break;
        case 'BRTC': nextPc = this.branchIf(this.T === 0, args[0], line, nextPc); break;
        case 'BRIS': case 'BRIE': nextPc = this.branchIf(this.I === 1, args[0], line, nextPc); break;
        case 'BRIC': case 'BRID': nextPc = this.branchIf(this.I === 0, args[0], line, nextPc); break;

        case 'JMP': case 'RJMP': {
          nextPc = this.parseLabelTarget(args[0], line);
          this.cycles += (op === 'JMP') ? 3 : 2;
          break;
        }
        case 'IJMP': {
          nextPc = this.getPair('Z');
          this.cycles += 2;
          break;
        }

        case 'CALL': case 'RCALL': {
          const target = this.parseLabelTarget(args[0], line);
          // push return address (next instr PC)
          const ret = nextPc;
          this.push(ret & 0xFF);
          this.push((ret >> 8) & 0xFF);
          nextPc = target;
          this.cycles += (op === 'CALL') ? 4 : 3;
          break;
        }
        case 'RET': case 'RETI': {
          const hi = this.pop();
          const lo = this.pop();
          nextPc = (hi << 8) | lo;
          if (op === 'RETI') this.I = 1;
          this.cycles += 4;
          break;
        }

        case 'PUSH': {
          const rd = parseRegister(args[0], line);
          this.push(this.regs[rd]);
          this.cycles += 2;
          break;
        }
        case 'POP': {
          const rd = parseRegister(args[0], line);
          this.regs[rd] = this.pop();
          this.cycles += 2;
          break;
        }

        case 'LDS': {
          const rd = parseRegister(args[0], line);
          const addr = parseAddress(args[1], line, this.equs);
          this.regs[rd] = this.readMem(addr);
          this.cycles += 2;
          break;
        }
        case 'STS': {
          const addr = parseAddress(args[0], line, this.equs);
          const rr = parseRegister(args[1], line);
          this.writeMem(addr, this.regs[rr]);
          this.cycles += 2;
          break;
        }
        case 'IN': {
          const rd = parseRegister(args[0], line);
          const ioAddr = parseIoReg(args[1], line, this.equs);
          this.regs[rd] = this.readMem(ioAddr);
          this.cycles += 1;
          break;
        }
        case 'OUT': {
          const ioAddr = parseIoReg(args[0], line, this.equs);
          const rr = parseRegister(args[1], line);
          this.writeMem(ioAddr, this.regs[rr]);
          this.cycles += 1;
          break;
        }

        case 'SBI': {
          const ioAddr = parseIoReg(args[0], line, this.equs);
          const bit = parseImmediate(args[1], line, this.equs) & 7;
          this.writeMem(ioAddr, this.readMem(ioAddr) | (1 << bit));
          this.cycles += 2;
          break;
        }
        case 'CBI': {
          const ioAddr = parseIoReg(args[0], line, this.equs);
          const bit = parseImmediate(args[1], line, this.equs) & 7;
          this.writeMem(ioAddr, this.readMem(ioAddr) & (~(1<<bit) & 0xFF));
          this.cycles += 2;
          break;
        }
        case 'SBIC': {
          const ioAddr = parseIoReg(args[0], line, this.equs);
          const bit = parseImmediate(args[1], line, this.equs) & 7;
          if ((this.readMem(ioAddr) & (1<<bit)) === 0) {
            nextPc = this.pc + 2; // skip next
            this.cycles += 2;
          } else {
            this.cycles += 1;
          }
          break;
        }
        case 'SBIS': {
          const ioAddr = parseIoReg(args[0], line, this.equs);
          const bit = parseImmediate(args[1], line, this.equs) & 7;
          if ((this.readMem(ioAddr) & (1<<bit)) !== 0) {
            nextPc = this.pc + 2;
            this.cycles += 2;
          } else {
            this.cycles += 1;
          }
          break;
        }
        case 'SBRC': {
          const rd = parseRegister(args[0], line);
          const bit = parseImmediate(args[1], line, this.equs) & 7;
          if ((this.regs[rd] & (1<<bit)) === 0) {
            nextPc = this.pc + 2;
            this.cycles += 2;
          } else {
            this.cycles += 1;
          }
          break;
        }
        case 'SBRS': {
          const rd = parseRegister(args[0], line);
          const bit = parseImmediate(args[1], line, this.equs) & 7;
          if ((this.regs[rd] & (1<<bit)) !== 0) {
            nextPc = this.pc + 2;
            this.cycles += 2;
          } else {
            this.cycles += 1;
          }
          break;
        }

        case 'LD': {
          const rd = parseRegister(args[0], line);
          const ind = this.parseIndirect(args[1], line);
          let addr = this.getPair(ind.reg);
          if (ind.mode === 'PRE_DEC') { addr = (addr - 1) & 0xFFFF; this.setPair(ind.reg, addr); }
          if (ind.mode === 'DISP') addr = (addr + ind.disp) & 0xFFFF;
          this.regs[rd] = this.readMem(addr);
          if (ind.mode === 'POST_INC') this.setPair(ind.reg, (addr + 1) & 0xFFFF);
          this.cycles += 2;
          break;
        }
        case 'LDD': {
          const rd = parseRegister(args[0], line);
          const ind = this.parseIndirect(args[1], line);
          let addr = (this.getPair(ind.reg) + ind.disp) & 0xFFFF;
          this.regs[rd] = this.readMem(addr);
          this.cycles += 2;
          break;
        }
        case 'ST': {
          const ind = this.parseIndirect(args[0], line);
          const rr = parseRegister(args[1], line);
          let addr = this.getPair(ind.reg);
          if (ind.mode === 'PRE_DEC') { addr = (addr - 1) & 0xFFFF; this.setPair(ind.reg, addr); }
          if (ind.mode === 'DISP') addr = (addr + ind.disp) & 0xFFFF;
          this.writeMem(addr, this.regs[rr]);
          if (ind.mode === 'POST_INC') this.setPair(ind.reg, (addr + 1) & 0xFFFF);
          this.cycles += 2;
          break;
        }
        case 'STD': {
          const ind = this.parseIndirect(args[0], line);
          const rr = parseRegister(args[1], line);
          let addr = (this.getPair(ind.reg) + ind.disp) & 0xFFFF;
          this.writeMem(addr, this.regs[rr]);
          this.cycles += 2;
          break;
        }

        case 'SEI': this.I = 1; this.cycles += 1; break;
        case 'CLI': this.I = 0; this.cycles += 1; break;
        case 'SEC': this.C = 1; this.cycles += 1; break;
        case 'CLC': this.C = 0; this.cycles += 1; break;
        case 'SEZ': this.Z = 1; this.cycles += 1; break;
        case 'CLZ': this.Z = 0; this.cycles += 1; break;
        case 'SEN': this.N = 1; this.cycles += 1; break;
        case 'CLN': this.N = 0; this.cycles += 1; break;
        case 'SEV': this.V = 1; this.cycles += 1; break;
        case 'CLV': this.V = 0; this.cycles += 1; break;
        case 'SES': this.S = 1; this.cycles += 1; break;
        case 'CLS': this.S = 0; this.cycles += 1; break;
        case 'SEH': this.H = 1; this.cycles += 1; break;
        case 'CLH': this.H = 0; this.cycles += 1; break;
        case 'SET': this.T = 1; this.cycles += 1; break;
        case 'CLT': this.T = 0; this.cycles += 1; break;

        case 'BREAK': case 'WDR': case 'SLEEP': this.cycles += 1; break;

        default:
          throw new Error(`Satir ${line}: '${op}' komutu desteklenmiyor`);
      }
    } catch (e) {
      this.error = e.message;
      this.halted = true;
      return false;
    }
    this.pc = nextPc;
    this.stepsExecuted++;
    if (this.stepsExecuted >= this.maxSteps) {
      this.error = `Maksimum adim sayisi (${this.maxSteps}) asildi — sonsuz dongu olabilir?`;
      this.halted = true;
      return false;
    }
    return true;
  }

  branchIf(cond, labelTok, line, nextPc) {
    if (cond) {
      this.cycles += 2;
      return this.parseLabelTarget(labelTok, line);
    } else {
      this.cycles += 1;
      return nextPc;
    }
  }

  run(maxSteps = this.maxSteps) {
    this.maxSteps = maxSteps;
    while (!this.halted && this.step()) {}
    return !this.error;
  }
}

    "code": "const int btn=2, led=13; volatile bool s=0;\nvoid isr(){ s=!s; }\nvoid setup(){ pinMode(btn,INPUT_PULLUP); pinMode(led,OUTPUT); attachInterrupt(digitalPinToInterrupt(btn),isr,FALLING); }\nvoid loop(){ digitalWrite(led,s); }",
    "explanation": "Falling edge geldiğinde ISR çalışır.",

  }
];

// ===== Basit assembly syntax highlight =====
const KW = new Set([
  'LDI','MOV','ADD','ADC','SUB','SUBI','SBC','SBCI','AND','ANDI','OR','ORI','EOR',
  'INC','DEC','NEG','COM','CLR','SER','TST','LSL','LSR','ASR','ROL','ROR','SWAP',
  'CP','CPI','CPC','BREQ','BRNE','BRCS','BRCC','BRLO','BRSH','BRMI','BRPL','BRLT','BRGE',
  'BRVS','BRVC','BRTS','BRTC','BRIS','BRIC','JMP','RJMP','IJMP','CALL','RCALL','RET','RETI',
  'PUSH','POP','LDS','STS','IN','OUT','LD','ST','LDD','STD','SBI','CBI','SBIC','SBIS',
  'SBRC','SBRS','NOP','SEI','CLI','SEC','CLC','SEZ','CLZ','SBR','CBR'
]);
function highlightAsm(src) {
  return src.split('\n').map(line => {
    const cIdx = line.indexOf(';');
    let code = line, comment = '';
    if (cIdx >= 0) { code = line.slice(0, cIdx); comment = line.slice(cIdx); }
    code = escapeHtml(code).replace(/\b([A-Z]{2,5})\b/gi, (m) => {
      if (KW.has(m.toUpperCase())) return `<span class="kw">${m}</span>`;
      return m;
    }).replace(/\b(R\d{1,2}|X[LH]?|Y[LH]?|Z[LH]?)\b/g, '<span class="reg">$1</span>')
      .replace(/(\$[0-9A-Fa-f]+|0x[0-9A-Fa-f]+|0b[01]+|\b\d+\b)/g, '<span class="num">$1</span>')
      .replace(/^(\s*)([A-Za-z_]\w*):/g, '$1<span class="lbl">$2:</span>');
    return code + (comment ? `<span class="com">${escapeHtml(comment)}</span>` : '');
  }).join('\n');
}
function escapeHtml(s) {
  return (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]);
}

// ===== Simulator page =====
const DEFAULT_SIM_CODE = `; AVR Assembly simulatorune hosgeldin
; Asagidaki kodu degistir, sonra "Calistir" tikla

LDI R20, 10
LDI R21, 20
ADD R20, R21      ; R20 = 30
LDI R22, 5
SUB R20, R22      ; R20 = 25

; PORTB'yi yak: en kolay LED ornegi
LDI R16, 0xFF
OUT DDRB, R16
LDI R16, 0xA5     ; 10100101
OUT PORTB, R16
`;

let simState = null;

function renderSimulator(initialCode) {
  document.getElementById('main').innerHTML = `
    <button class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰ Menu</button>
    <div class="page-head">
      <h1>🧪 AVR Assembly Simulator</h1>
      <div class="sub">Kodunu yaz, <kbd>Calistir</kbd> ile baslat, <kbd>Adim</kbd> ile tek tek ilerle. Register'lar, SREG ve PORTB LED'leri canli guncellenir.</div>
    </div>

    <div class="card">
      <div class="editor-wrap">
        <div class="editor-header">
          <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
          <div class="lbl">kod.asm</div>
        </div>
        <textarea id="sim-code" class="code-editor" spellcheck="false">${escapeHtml(initialCode || DEFAULT_SIM_CODE)}</textarea>
      </div>
      <div class="toolbar">
        <button class="btn primary" onclick="simRun()">▶ Calistir (hepsi)</button>
        <button class="btn teal" onclick="simStep()">→ Adim (1 komut)</button>
        <button class="btn gold" onclick="simReset()">↻ Resetle</button>
        <button class="btn ghost" onclick="simLoad()">📥 Yukle (programi yeniden parse)</button>
      </div>

      <div class="sim-row">
        <div>
          <div class="sim-panel">
            <h4>SREG bayraklari</h4>
            <div id="sim-flags" class="flags"></div>
          </div>
          <div class="sim-panel" style="margin-top:10px">
            <h4>PORTB LED gorseli (Pin 7 ← → Pin 0)</h4>
            <div id="sim-leds" class="led-bar"></div>
            <div style="font-family:Fira Code,monospace;font-size:11.5px;color:var(--text-dim)" id="sim-port-vals"></div>
          </div>
          <div class="sim-panel" style="margin-top:10px">
            <h4>Stack pointer & sayim</h4>
            <div id="sim-misc" style="font-family:Fira Code,monospace;font-size:12px;color:var(--text)"></div>
          </div>
        </div>
        <div>
          <div class="sim-panel">
            <h4>Register'lar R0–R31</h4>
            <div id="sim-regs" class="regs-grid"></div>
          </div>
        </div>
      </div>

      <div class="sim-panel" style="margin-top:10px">
        <h4>Bellek (0x100..0x14F)</h4>
        <div id="sim-mem" class="mem-box"></div>
      </div>

      <div id="sim-console" class="console">Hazir. "Yukle"ye sonra "Calistir"a bas.</div>
    </div>
  `;
  simInit();
}

function openInSimulator(code) {
  navigate('simulator');
  setTimeout(() => {
    document.getElementById('sim-code').value = code;
    simLoad();
    toast('Kod simulatore yuklendi', 'success');
  }, 50);
}

function simInit() {
  simState = { sim: new AVRSim(), prevRegs: new Uint8Array(32) };
  // Render skeleton
  simReset();
}

function simLoad() {
  const code = document.getElementById('sim-code').value;
  simState.sim = new AVRSim();
  try {
    simState.sim.load(code);
    simState.prevRegs = new Uint8Array(32);
    simRender('info', `Yuklendi: ${simState.sim.program.length} komut.`);
  } catch (e) {
    simRender('err', e.message);
  }
}

function simReset() {
  if (!simState) return;
  simState.sim.reset();
  // Re-parse current code so labels are kept
  const code = document.getElementById('sim-code').value;
  try {
    simState.sim.load(code);
  } catch (e) {
    simRender('err', e.message);
    return;
  }
  simState.prevRegs = new Uint8Array(32);
  simRender('info', 'Resetlendi. PC = 0.');
}

function simStep() {
  if (!simState || !simState.sim.program) {
    simLoad();
    if (!simState.sim.program) return;
  }
  const prev = new Uint8Array(simState.sim.regs);
  const ok = simState.sim.step();
  simState.prevRegs = prev;
  if (!ok && simState.sim.error) {
    simRender('err', '⚠ ' + simState.sim.error);
  } else if (simState.sim.halted) {
    simRender('ok', `✓ Program tamamlandi (toplam ${simState.sim.stepsExecuted} adim, ${simState.sim.cycles} cevrim).`);
  } else {
    simRender('info', `Adim ${simState.sim.stepsExecuted} — PC = ${simState.sim.pc} / ${simState.sim.program.length}`);
  }
}

function simRun() {
  if (!simState || !simState.sim.program) {
    simLoad();
    if (!simState.sim.program) return;
  }
  const prev = new Uint8Array(simState.sim.regs);
  simState.sim.run();
  simState.prevRegs = prev;
  if (simState.sim.error) {
    simRender('err', '⚠ ' + simState.sim.error);
  } else {
    simRender('ok', `✓ Tamamlandi. Adim: ${simState.sim.stepsExecuted}, Cevrim: ${simState.sim.cycles}`);
  }
}

function simRender(kind, msg) {
  const sim = simState.sim;
  // Registers
  const regsEl = document.getElementById('sim-regs');
  regsEl.innerHTML = '';
  for (let i = 0; i < 32; i++) {
    const v = sim.regs[i];
    const changed = simState.prevRegs && simState.prevRegs[i] !== v;
    regsEl.insertAdjacentHTML('beforeend',
      `<div class="reg ${changed ? 'changed' : ''}">
        <span class="n">R${i}</span>
        <span class="v">${hex2(v)}</span>
      </div>`);
  }
  // Flags
  const flagsEl = document.getElementById('sim-flags');
  flagsEl.innerHTML = ['I','T','H','S','V','N','Z','C'].map(n => {
    const idx = { C:0,Z:1,N:2,V:3,S:4,H:5,T:6,I:7 }[n];
    const val = (sim.sreg >> idx) & 1;
    return `<div class="flag ${val ? 'set' : 'unset'}"><span class="n">${n}</span><span class="v">${val}</span></div>`;
  }).join('');
  // LEDs (PORTB pin 7 .. pin 0 visually)
  const portB = sim.io[IO_ADDR.PORTB];
  const ddrB = sim.io[IO_ADDR.DDRB];
  const ledsEl = document.getElementById('sim-leds');
  ledsEl.innerHTML = '';
  for (let i = 7; i >= 0; i--) {
    const isOutput = (ddrB >> i) & 1;
    const isOn = isOutput && ((portB >> i) & 1);
    ledsEl.insertAdjacentHTML('beforeend',
      `<div class="led ${isOn ? 'on' : ''}" title="PB${i}">${i}</div>`);
  }
  document.getElementById('sim-port-vals').textContent =
    `DDRB=0x${hex2(ddrB)}  PORTB=0x${hex2(portB)}  PINB=0x${hex2(sim.io[IO_ADDR.PINB])}` +
    `   |   DDRC=0x${hex2(sim.io[IO_ADDR.DDRC])}  PORTC=0x${hex2(sim.io[IO_ADDR.PORTC])}` +
    `   |   DDRD=0x${hex2(sim.io[IO_ADDR.DDRD])}  PORTD=0x${hex2(sim.io[IO_ADDR.PORTD])}`;
  // SP and counters
  document.getElementById('sim-misc').innerHTML =
    `SP = 0x${hex4(sim.SP)}   |   PC = ${sim.pc}   |   Adim = ${sim.stepsExecuted}   |   Cevrim = ${sim.cycles}`;
  // Memory dump 0x100..0x14F
  const memEl = document.getElementById('sim-mem');
  let mem = '';
  for (let row = 0; row < 5; row++) {
    const base = 0x100 + row * 16;
    let line = `<span style="color:var(--text-mute)">0x${hex4(base)}</span>  `;
    for (let i = 0; i < 16; i++) {
      const v = sim.readMem(base + i);
      const color = v !== 0 ? 'var(--teal)' : 'var(--text-mute)';
      line += `<span style="color:${color}">${hex2(v)}</span> `;
      if (i === 7) line += ' ';
    }
    mem += line + '\n';
  }
  memEl.innerHTML = mem;

  // Console
  if (msg) {
    const c = document.getElementById('sim-console');
    const cls = kind === 'err' ? 'err' : (kind === 'ok' ? 'ok' : 'info');
    const time = new Date().toLocaleTimeString();
    c.innerHTML += `\n<span class="${cls}">[${time}] ${escapeHtml(msg)}</span>`;
    c.scrollTop = c.scrollHeight;
  }
}

function hex2(n) { return ('0' + (n & 0xFF).toString(16)).slice(-2).toUpperCase(); }
function hex4(n) { return ('000' + (n & 0xFFFF).toString(16)).slice(-4).toUpperCase(); }

function topicLabel(t) {
  return ({
    basics: 'Temel komutlar',
    flags: 'Bayrak & Dallanma',
    stack: 'Stack & Fonksiyon',
    io: 'I/O portlari',
    arith: 'Aritmetik & Mantik',
    addressing: 'Adresleme modlari',
    timer: 'Timer',
    interrupt: 'Interrupt'
  })[t] || t;
}

function renderProblemsList(topic, level) {
  const list = PROBLEMS.filter(p =>
    (topic === 'all' || p.topic === topic) &&
    (level === 'all' || p.level === level)
  );
  const html = list.map((p, idx) => problemCard(p, idx)).join('') ||
    `<div class="card"><em style="color:var(--text-mute)">Bu filtreyle problem bulunamadi.</em></div>`;
  document.getElementById('problems-list').innerHTML = html;

  // Wire collapse toggles
  list.forEach((p) => {
    const root = document.getElementById('p-' + p.id);
    if (!root) return;
    root.querySelectorAll('.collapse-header').forEach(h => {
      h.onclick = () => h.parentElement.classList.toggle('open');
    });
  });
}

function problemCard(p, idx) {
  const solved = Store.isSolved(p.id);
  const code = p.starter || '';
  return `
    <div class="problem" id="p-${p.id}">
      <div class="problem-head">
        <span class="level ${p.level.toLowerCase()}">${p.level}</span>
        <span class="topic">${topicLabel(p.topic)}</span>
        <span class="title">${escapeHtml(p.title)}</span>
        <span class="status ${solved?'done':''}">${solved ? '✓ Cozuldu' : ''}</span>
      </div>
      <div class="desc">${escapeHtml(p.desc)}</div>

      <div class="editor-wrap">
        <div class="editor-header">
          <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
          <div class="lbl">${p.id}.asm</div>
        </div>
        <textarea class="code-editor" id="ed-${p.id}" spellcheck="false" style="min-height:160px">${escapeHtml(code)}</textarea>
      </div>

      <div class="toolbar">
        <button class="btn primary" onclick="checkProblem('${p.id}')">✓ Kontrol Et</button>
        <button class="btn teal" onclick="runOnly('${p.id}')">▶ Sadece Calistir</button>
        <button class="btn ghost" onclick="openProblemInSim('${p.id}')">🧪 Buyuk Simulatorde Ac</button>
      </div>

      <div class="collapse">
        <div class="collapse-header">
          <span class="chev">▶</span> Cozumu goster
        </div>
        <div class="collapse-content">
          <div class="editor-wrap" style="margin-top:8px">
            <div class="editor-header">
              <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
              <div class="lbl">cozum.asm</div>
            </div>
            <pre class="code code-asm">${highlightAsm(p.solution)}</pre>
          </div>
          <div class="toolbar" style="margin-top:8px">
            <button class="btn ghost" onclick="loadSolution('${p.id}')">📋 Cozumu editor'e kopyala</button>
          </div>
        </div>
      </div>

      <div class="console" id="out-${p.id}" style="display:none"></div>
    </div>
  `;
}

function checkProblem(pid) {
  const p = PROBLEMS.find(x => x.id === pid);
  const code = document.getElementById('ed-' + pid).value;
  const out = document.getElementById('out-' + pid);
  out.style.display = 'block';
  const sim = new AVRSim();
  try {
    sim.load(code);
    sim.run();
    if (sim.error) {
      out.innerHTML = `<span class="err">⚠ Calisma hatasi: ${escapeHtml(sim.error)}</span>`;
      toast('Hata var, konsola bak', 'error');
      return;
    }
    const res = p.check(sim);
    if (res.ok) {
      out.innerHTML = `<span class="ok">✓ Dogru! Sonuc beklendigi gibi.</span>\n` +
        `<span class="info">Adim: ${sim.stepsExecuted}, Cevrim: ${sim.cycles}</span>`;
      Store.markSolved(pid);
      // Update status chip
      const status = document.querySelector(`#p-${pid} .status`);
      status.classList.add('done');
      status.textContent = '✓ Cozuldu';
      // Update sidebar badge
      document.getElementById('sidebar').innerHTML = renderSidebar();
      document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.route === getRoute()));
      toast(`✓ ${p.title} cozuldu! Toplam: ${Store.solvedCount()}/${PROBLEMS.length}`, 'success');
    } else {
      out.innerHTML = `<span class="err">✗ Yanlis: ${escapeHtml(res.msg || 'Sonuc beklendigi gibi degil')}</span>`;
      toast('Henuz dogru degil, tekrar dene', 'error');
    }
  } catch (e) {
    out.innerHTML = `<span class="err">⚠ Hata: ${escapeHtml(e.message)}</span>`;
  }
}

function runOnly(pid) {
  const code = document.getElementById('ed-' + pid).value;
  const out = document.getElementById('out-' + pid);
  out.style.display = 'block';
  const sim = new AVRSim();
  try {
    sim.load(code);
    sim.run();
    if (sim.error) {
      out.innerHTML = `<span class="err">⚠ ${escapeHtml(sim.error)}</span>`;
      return;
    }
    let s = `<span class="ok">✓ Calisma tamam.</span>\n`;
    s += `<span class="info">Adim: ${sim.stepsExecuted}, Cevrim: ${sim.cycles}</span>\n`;
    s += `R16=${hex2(sim.regs[16])} R17=${hex2(sim.regs[17])} R18=${hex2(sim.regs[18])} R19=${hex2(sim.regs[19])}\n`;
    s += `R20=${hex2(sim.regs[20])} R21=${hex2(sim.regs[21])} R22=${hex2(sim.regs[22])} R23=${hex2(sim.regs[23])}\n`;
    s += `R24=${hex2(sim.regs[24])} R25=${hex2(sim.regs[25])} R26=${hex2(sim.regs[26])} R27=${hex2(sim.regs[27])}\n`;
    s += `PORTB=0x${hex2(sim.io[IO_ADDR.PORTB])} DDRB=0x${hex2(sim.io[IO_ADDR.DDRB])}\n`;
    s += `SREG: I=${sim.I} T=${sim.T} H=${sim.H} S=${sim.S} V=${sim.V} N=${sim.N} Z=${sim.Z} C=${sim.C}`;
    out.innerHTML = s;
  } catch (e) {
    out.innerHTML = `<span class="err">⚠ ${escapeHtml(e.message)}</span>`;
  }
}

function loadSolution(pid) {
  const p = PROBLEMS.find(x => x.id === pid);
  document.getElementById('ed-' + pid).value = p.solution;
  toast('Cozum yuklendi', 'success');
}

function openProblemInSim(pid) {
  const code = document.getElementById('ed-' + pid).value;
  openInSimulator(code);
}

// ===== Progress =====
function renderProgress() {
  const solved = Store.solvedCount();
  const total = PROBLEMS.length;
  const pct = Math.round(solved / total * 100);
  const data = Store.get();
  const recent = data.solved
    ? Object.entries(data.solved).sort((a,b) => b[1]-a[1]).slice(0, 10)
    : [];

  // Per-topic stats
  const byTopic = {};
  PROBLEMS.forEach(p => {
    byTopic[p.topic] = byTopic[p.topic] || { total: 0, solved: 0 };
    byTopic[p.topic].total++;
    if (Store.isSolved(p.id)) byTopic[p.topic].solved++;
  });

  document.getElementById('main').innerHTML = `
    <button class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰ Menu</button>

      <h3 style="margin-top:18px">Konuya gore</h3>
      ${Object.entries(byTopic).map(([t, s]) => `
        <div style="margin:8px 0">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:13px">

          <div class="progress-bar"><div class="fill" style="width:${Math.round(s.solved/s.total*100)}%"></div></div>
        </div>
      `).join('')}
    </div>

    <div class="card">
      <h2>Son cozulen problemler</h2>
      ${recent.length === 0
        ? `<p style="color:var(--text-mute)">Henuz problem cozmedin. <a href="#practice">Pratik sayfasina</a> git!</p>`
        : recent.map(([pid, ts]) => {
            const p = PROBLEMS.find(x => x.id === pid);
            return p ? `<div style="padding:6px 0;border-bottom:1px solid var(--border-soft);font-size:13px">
              <span style="color:var(--green)">✓</span> ${escapeHtml(p.title)}

          }).join('')}

      <h3>Tum ilerlemeyi sifirla</h3>

      <button class="btn ghost" style="border-color:var(--red);color:var(--red)" onclick="resetProgress()">Sifirla</button>

}

  if (confirm('Tum ilerleme silinecek. Emin misin?')) {

}

// ===== Utility =====
function copyText(text) {
  navigator.clipboard.writeText(text).then(() => toast('Kopyalandi', 'success'));
}
function toast(msg, kind = '') {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.className = 'toast';
    document.body.appendChild(t);
  }
  t.className = 'toast ' + (kind || '') + ' show';
  t.textContent = msg;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== Init =====
function init() {
  document.getElementById('sidebar').innerHTML = renderSidebar();
  document.addEventListener('keydown', (e) => {
    if (getRoute() === 'simulator') {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); simRun(); }
      else if (e.key === 'F10') { e.preventDefault(); simStep(); }
      else if (e.key === 'F8') { e.preventDefault(); simReset(); }
    }
  });
  navigate(getRoute());
}
init();

</script>
